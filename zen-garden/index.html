<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    color: #e0d8c8;
    font-family: 'Georgia', serif;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }

  #garden-canvas {
    position: absolute;
    top: 0;
    left: 0;
    cursor: crosshair;
  }

  .toolbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    background: rgba(30, 28, 24, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(180, 165, 130, 0.15);
    border-radius: 16px;
    padding: 8px 14px;
    z-index: 100;
    align-items: center;
  }

  .toolbar button {
    background: rgba(180, 165, 130, 0.08);
    border: 1px solid rgba(180, 165, 130, 0.12);
    color: #c8bda8;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.82rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .toolbar button:hover {
    background: rgba(180, 165, 130, 0.18);
    border-color: rgba(180, 165, 130, 0.3);
  }

  .toolbar button.active {
    background: rgba(180, 165, 130, 0.22);
    border-color: rgba(180, 165, 130, 0.4);
    color: #e8dcc8;
  }

  .toolbar .sep {
    width: 1px;
    height: 24px;
    background: rgba(180, 165, 130, 0.15);
    margin: 0 4px;
  }

  .toolbar .tool-icon {
    font-size: 1.1rem;
  }

  .panel {
    position: fixed;
    right: 20px;
    top: 80px;
    background: rgba(30, 28, 24, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(180, 165, 130, 0.15);
    border-radius: 16px;
    padding: 18px;
    z-index: 100;
    width: 220px;
    font-size: 0.8rem;
  }

  .panel h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(200, 189, 168, 0.5);
    margin-bottom: 14px;
    font-weight: 400;
  }

  .panel label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    color: #a89880;
  }

  .panel input[type="range"] {
    width: 110px;
    accent-color: #8a7d60;
    height: 4px;
  }

  .sand-colors {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .sand-color-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sand-color-btn.active {
    border-color: rgba(255, 255, 255, 0.5);
    transform: scale(1.1);
  }

  .sand-color-btn:hover {
    transform: scale(1.1);
  }

  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 189, 168, 0.35);
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    z-index: 100;
    text-align: center;
  }

  .preset-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .preset-btn {
    background: rgba(180, 165, 130, 0.1);
    border: 1px solid rgba(180, 165, 130, 0.15);
    color: #a89880;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.72rem;
    font-family: inherit;
    transition: all 0.2s;
  }

  .preset-btn:hover {
    background: rgba(180, 165, 130, 0.2);
    color: #c8bda8;
  }

  @media (max-width: 700px) {
    .panel { display: none; }
    .toolbar { font-size: 0.75rem; padding: 6px 10px; }
    .toolbar button { padding: 6px 10px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<canvas id="garden-canvas"></canvas>

<div class="toolbar">
  <button id="tool-rake" class="active"><span class="tool-icon">〰️</span> Rake</button>
  <button id="tool-circle"><span class="tool-icon">◎</span> Circle</button>
  <button id="tool-stone"><span class="tool-icon">🪨</span> Stone</button>
  <button id="tool-moss"><span class="tool-icon">🌿</span> Moss</button>
  <button id="tool-water"><span class="tool-icon">💧</span> Water</button>
  <div class="sep"></div>
  <button id="btn-clear"><span class="tool-icon">✦</span> Clear</button>
</div>

<div class="panel">
  <h3>Settings</h3>

  <div class="sand-colors" id="sand-colors"></div>

  <label>Rake width <input type="range" id="rake-width" min="3" max="40" value="12"></label>
  <label>Rake teeth <input type="range" id="rake-teeth" min="1" max="8" value="4"></label>
  <label>Groove depth <input type="range" id="groove-depth" min="10" max="80" value="40"></label>
  <label>Sand grain <input type="range" id="sand-grain" min="0" max="50" value="20"></label>

  <h3 style="margin-top:16px">Presets</h3>
  <div class="preset-row">
    <button class="preset-btn" data-preset="zen">Zen</button>
    <button class="preset-btn" data-preset="waves">Waves</button>
    <button class="preset-btn" data-preset="spiral">Spiral</button>
    <button class="preset-btn" data-preset="garden">Garden</button>
    <button class="preset-btn" data-preset="minimal">Minimal</button>
  </div>
</div>

<div class="hint">Click & drag to rake · Scroll to resize · Right-click stones to remove</div>

<script>
const canvas = document.getElementById('garden-canvas');
const ctx = canvas.getContext('2d');

let W, H;
let sandBuffer, displayBuffer;
let sandCtx, displayCtx;

const SAND_PALETTES = [
  { name: 'Warm Sand', base: [215, 200, 170], groove: [180, 165, 135], bg: '#d7c8aa' },
  { name: 'Cool Grey', base: [195, 195, 190], groove: [160, 160, 155], bg: '#c3c3be' },
  { name: 'White Sand', base: [235, 230, 220], groove: [205, 200, 190], bg: '#ebe6dc' },
  { name: 'Dark Earth', base: [160, 140, 110], groove: [125, 108, 82], bg: '#a08c6e' },
  { name: 'Red Clay', base: [195, 155, 125], groove: [165, 125, 95], bg: '#c39b7d' },
];

let currentPalette = 0;
let currentTool = 'rake';
let rakeWidth = 12;
let rakeTeeth = 4;
let grooveDepth = 40;
let sandGrain = 20;

let stones = [];
let mossPatches = [];
let waterFeatures = [];
let isDrawing = false;
let lastX = 0, lastY = 0;
let circleCenter = null;

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  sandBuffer = document.createElement('canvas');
  sandBuffer.width = W;
  sandBuffer.height = H;
  sandCtx = sandBuffer.getContext('2d');

  displayBuffer = document.createElement('canvas');
  displayBuffer.width = W;
  displayBuffer.height = H;

  clearSand();
  render();
}

function clearSand() {
  const p = SAND_PALETTES[currentPalette];
  sandCtx.fillStyle = p.bg;
  sandCtx.fillRect(0, 0, W, H);
  addSandTexture();
  stones = [];
  mossPatches = [];
  waterFeatures = [];
}

function addSandTexture() {
  const imageData = sandCtx.getImageData(0, 0, W, H);
  const data = imageData.data;
  const grain = sandGrain / 100;

  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 30 * grain;
    data[i] = Math.max(0, Math.min(255, data[i] + noise));
    data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + noise));
    data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + noise));
  }

  sandCtx.putImageData(imageData, 0, 0);
}

function drawRakeGroove(x0, y0, x1, y1) {
  const p = SAND_PALETTES[currentPalette];
  const dx = x1 - x0;
  const dy = y1 - y0;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return;

  const nx = -dy / dist;
  const ny = dx / dist;

  const totalWidth = rakeWidth * rakeTeeth;
  const depth = grooveDepth / 100;

  for (let t = 0; t < rakeTeeth; t++) {
    const offset = (t - (rakeTeeth - 1) / 2) * rakeWidth;
    const cx = (x0 + x1) / 2 + nx * offset;
    const cy = (y0 + y1) / 2 + ny * offset;

    const grooveR = p.groove[0] + (Math.random() - 0.5) * 8;
    const grooveG = p.groove[1] + (Math.random() - 0.5) * 8;
    const grooveB = p.groove[2] + (Math.random() - 0.5) * 8;

    sandCtx.save();
    sandCtx.globalAlpha = 0.4 + depth * 0.5;
    sandCtx.strokeStyle = `rgb(${grooveR},${grooveG},${grooveB})`;
    sandCtx.lineWidth = rakeWidth * 0.5;
    sandCtx.lineCap = 'round';
    sandCtx.beginPath();
    sandCtx.moveTo(x0 + nx * offset, y0 + ny * offset);
    sandCtx.lineTo(x1 + nx * offset, y1 + ny * offset);
    sandCtx.stroke();

    // ridge highlights
    sandCtx.globalAlpha = 0.15 + depth * 0.2;
    sandCtx.strokeStyle = `rgb(${Math.min(255, p.base[0] + 20)},${Math.min(255, p.base[1] + 20)},${Math.min(255, p.base[2] + 20)})`;
    sandCtx.lineWidth = rakeWidth * 0.2;
    sandCtx.beginPath();
    sandCtx.moveTo(x0 + nx * (offset + rakeWidth * 0.35), y0 + ny * (offset + rakeWidth * 0.35));
    sandCtx.lineTo(x1 + nx * (offset + rakeWidth * 0.35), y1 + ny * (offset + rakeWidth * 0.35));
    sandCtx.stroke();

    sandCtx.restore();
  }
}

function drawCircleRake(cx, cy, radius) {
  const p = SAND_PALETTES[currentPalette];
  const depth = grooveDepth / 100;
  const steps = Math.max(60, Math.floor(radius * 0.8));

  for (let ring = 0; ring < rakeTeeth; ring++) {
    const r = radius + ring * rakeWidth;
    const grooveR = p.groove[0] + (Math.random() - 0.5) * 8;
    const grooveG = p.groove[1] + (Math.random() - 0.5) * 8;
    const grooveB = p.groove[2] + (Math.random() - 0.5) * 8;

    sandCtx.save();
    sandCtx.globalAlpha = 0.4 + depth * 0.5;
    sandCtx.strokeStyle = `rgb(${grooveR},${grooveG},${grooveB})`;
    sandCtx.lineWidth = rakeWidth * 0.5;
    sandCtx.lineCap = 'round';
    sandCtx.beginPath();
    sandCtx.arc(cx, cy, r, 0, Math.PI * 2);
    sandCtx.stroke();

    sandCtx.globalAlpha = 0.15 + depth * 0.2;
    sandCtx.strokeStyle = `rgb(${Math.min(255, p.base[0] + 20)},${Math.min(255, p.base[1] + 20)},${Math.min(255, p.base[2] + 20)})`;
    sandCtx.lineWidth = rakeWidth * 0.2;
    sandCtx.beginPath();
    sandCtx.arc(cx, cy, r + rakeWidth * 0.35, 0, Math.PI * 2);
    sandCtx.stroke();
    sandCtx.restore();
  }
}

function addStone(x, y) {
  const size = 20 + Math.random() * 40;
  const aspectX = 0.7 + Math.random() * 0.6;
  const aspectY = 0.5 + Math.random() * 0.5;
  const rotation = Math.random() * Math.PI;
  const shade = 60 + Math.random() * 60;
  const type = Math.random();

  stones.push({ x, y, size, aspectX, aspectY, rotation, shade, type });
}

function addMoss(x, y) {
  const size = 15 + Math.random() * 25;
  const blades = 8 + Math.floor(Math.random() * 12);
  mossPatches.push({ x, y, size, blades, seed: Math.random() * 1000 });
}

function addWater(x, y) {
  const size = 30 + Math.random() * 40;
  waterFeatures.push({ x, y, size, time: 0 });
}

function drawStone(stone) {
  const { x, y, size, aspectX, aspectY, rotation, shade, type } = stone;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  const grad = ctx.createRadialGradient(
    -size * 0.15, -size * 0.15, 0,
    0, 0, size * Math.max(aspectX, aspectY)
  );
  grad.addColorStop(0, `rgb(${shade + 30},${shade + 28},${shade + 22})`);
  grad.addColorStop(0.6, `rgb(${shade},${shade - 2},${shade - 5})`);
  grad.addColorStop(1, `rgb(${shade - 20},${shade - 22},${shade - 25})`);

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, size * aspectX, size * aspectY, 0, 0, Math.PI * 2);
  ctx.fill();

  // subtle texture
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 15; i++) {
    const sx = (Math.random() - 0.5) * size * aspectX * 1.6;
    const sy = (Math.random() - 0.5) * size * aspectY * 1.6;
    const sr = 1 + Math.random() * 2;
    ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,0.2)` : `rgba(0,0,0,0.15)`;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  // shadow
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(size * 0.1, size * aspectY * 0.85, size * aspectX * 0.9, size * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawMossPatch(patch) {
  const { x, y, size, blades, seed } = patch;

  ctx.save();
  ctx.translate(x, y);

  for (let i = 0; i < blades; i++) {
    const angle = (i / blades) * Math.PI * 2 + Math.sin(seed + i) * 0.3;
    const len = size * (0.5 + Math.random() * 0.5);
    const hue = 100 + Math.sin(seed + i * 0.5) * 20;
    const sat = 40 + Math.random() * 20;
    const lit = 25 + Math.random() * 15;

    ctx.strokeStyle = `hsl(${hue}, ${sat}%, ${lit}%)`;
    ctx.lineWidth = 2 + Math.random() * 2;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.6 + Math.random() * 0.3;

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(
      Math.cos(angle) * len * 0.6 + Math.sin(seed + i) * 4,
      Math.sin(angle) * len * 0.6,
      Math.cos(angle) * len,
      Math.sin(angle) * len
    );
    ctx.stroke();
  }

  // center cluster
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = `hsl(110, 35%, 28%)`;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.15, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawWaterFeature(feature, time) {
  const { x, y, size } = feature;

  ctx.save();
  ctx.translate(x, y);

  // pool base
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  grad.addColorStop(0, 'rgba(80, 120, 140, 0.5)');
  grad.addColorStop(0.7, 'rgba(60, 100, 120, 0.35)');
  grad.addColorStop(1, 'rgba(50, 80, 100, 0.1)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // ripples
  for (let r = 0; r < 3; r++) {
    const rippleR = (size * 0.3 + r * size * 0.25 + time * 0.3) % (size * 0.9);
    const alpha = 0.15 * (1 - rippleR / (size * 0.9));
    ctx.strokeStyle = `rgba(180, 210, 230, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 0, rippleR, rippleR * 0.7, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // reflection highlight
  ctx.globalAlpha = 0.15 + Math.sin(time * 0.05) * 0.05;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-size * 0.2, -size * 0.15, size * 0.12, size * 0.08, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

let animTime = 0;

function render() {
  animTime++;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(sandBuffer, 0, 0);

  waterFeatures.forEach(f => drawWaterFeature(f, animTime));
  mossPatches.forEach(p => drawMossPatch(p));
  stones.forEach(s => drawStone(s));

  // circle preview
  if (currentTool === 'circle' && circleCenter && isDrawing) {
    const r = Math.sqrt((lastX - circleCenter.x) ** 2 + (lastY - circleCenter.y) ** 2);
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(200, 190, 170, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(circleCenter.x, circleCenter.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  requestAnimationFrame(render);
}

// Input handling
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 2) {
    // right click: remove nearest stone
    e.preventDefault();
    const threshold = 50;
    let minDist = Infinity, minIdx = -1;
    stones.forEach((s, i) => {
      const d = Math.sqrt((s.x - e.clientX) ** 2 + (s.y - e.clientY) ** 2);
      if (d < threshold && d < minDist) { minDist = d; minIdx = i; }
    });
    if (minIdx >= 0) stones.splice(minIdx, 1);
    return;
  }

  isDrawing = true;
  lastX = e.clientX;
  lastY = e.clientY;

  if (currentTool === 'stone') {
    addStone(e.clientX, e.clientY);
    isDrawing = false;
  } else if (currentTool === 'moss') {
    addMoss(e.clientX, e.clientY);
    isDrawing = false;
  } else if (currentTool === 'water') {
    addWater(e.clientX, e.clientY);
    isDrawing = false;
  } else if (currentTool === 'circle') {
    circleCenter = { x: e.clientX, y: e.clientY };
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDrawing) return;

  if (currentTool === 'rake') {
    drawRakeGroove(lastX, lastY, e.clientX, e.clientY);
    lastX = e.clientX;
    lastY = e.clientY;
  } else if (currentTool === 'circle') {
    lastX = e.clientX;
    lastY = e.clientY;
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (currentTool === 'circle' && circleCenter && isDrawing) {
    const r = Math.sqrt((e.clientX - circleCenter.x) ** 2 + (e.clientY - circleCenter.y) ** 2);
    if (r > 10) drawCircleRake(circleCenter.x, circleCenter.y, r);
    circleCenter = null;
  }
  isDrawing = false;
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  isDrawing = true;
  lastX = t.clientX;
  lastY = t.clientY;

  if (currentTool === 'stone') {
    addStone(t.clientX, t.clientY);
    isDrawing = false;
  } else if (currentTool === 'moss') {
    addMoss(t.clientX, t.clientY);
    isDrawing = false;
  } else if (currentTool === 'water') {
    addWater(t.clientX, t.clientY);
    isDrawing = false;
  } else if (currentTool === 'circle') {
    circleCenter = { x: t.clientX, y: t.clientY };
  }
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDrawing) return;
  const t = e.touches[0];

  if (currentTool === 'rake') {
    drawRakeGroove(lastX, lastY, t.clientX, t.clientY);
    lastX = t.clientX;
    lastY = t.clientY;
  } else if (currentTool === 'circle') {
    lastX = t.clientX;
    lastY = t.clientY;
  }
});

canvas.addEventListener('touchend', (e) => {
  if (currentTool === 'circle' && circleCenter && isDrawing) {
    const r = Math.sqrt((lastX - circleCenter.x) ** 2 + (lastY - circleCenter.y) ** 2);
    if (r > 10) drawCircleRake(circleCenter.x, circleCenter.y, r);
    circleCenter = null;
  }
  isDrawing = false;
});

// Tool buttons
const tools = ['rake', 'circle', 'stone', 'moss', 'water'];
tools.forEach(tool => {
  document.getElementById(`tool-${tool}`).addEventListener('click', () => {
    currentTool = tool;
    tools.forEach(t => document.getElementById(`tool-${t}`).classList.toggle('active', t === tool));
  });
});

document.getElementById('btn-clear').addEventListener('click', clearSand);

// Settings
document.getElementById('rake-width').addEventListener('input', (e) => rakeWidth = +e.target.value);
document.getElementById('rake-teeth').addEventListener('input', (e) => rakeTeeth = +e.target.value);
document.getElementById('groove-depth').addEventListener('input', (e) => grooveDepth = +e.target.value);
document.getElementById('sand-grain').addEventListener('input', (e) => {
  sandGrain = +e.target.value;
  clearSand();
});

// Sand color palette buttons
const colorContainer = document.getElementById('sand-colors');
SAND_PALETTES.forEach((pal, i) => {
  const btn = document.createElement('div');
  btn.className = 'sand-color-btn' + (i === 0 ? ' active' : '');
  btn.style.background = pal.bg;
  btn.title = pal.name;
  btn.addEventListener('click', () => {
    currentPalette = i;
    document.querySelectorAll('.sand-color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    clearSand();
  });
  colorContainer.appendChild(btn);
});

// Presets
function applyPreset(name) {
  clearSand();
  const cx = W / 2, cy = H / 2;

  if (name === 'zen') {
    // Classic three-stone arrangement with concentric circles
    addStone(cx - 80, cy - 20);
    addStone(cx + 60, cy + 40);
    addStone(cx + 10, cy - 80);
    drawCircleRake(cx - 80, cy - 20, 60);
    drawCircleRake(cx + 60, cy + 40, 50);
    drawCircleRake(cx + 10, cy - 80, 55);
    // horizontal lines
    for (let y = 80; y < H - 80; y += rakeWidth * rakeTeeth + 4) {
      drawRakeGroove(60, y, W - 60, y);
    }
  } else if (name === 'waves') {
    for (let y = 60; y < H - 60; y += rakeWidth * rakeTeeth + 6) {
      const steps = 80;
      for (let s = 0; s < steps; s++) {
        const x0 = 40 + (W - 80) * (s / steps);
        const x1 = 40 + (W - 80) * ((s + 1) / steps);
        const wave = Math.sin(x0 * 0.008 + y * 0.003) * 30;
        const wave2 = Math.sin(x1 * 0.008 + y * 0.003) * 30;
        drawRakeGroove(x0, y + wave, x1, y + wave2);
      }
    }
  } else if (name === 'spiral') {
    const turns = 6;
    const maxR = Math.min(W, H) * 0.4;
    const steps = turns * 120;
    for (let i = 0; i < steps; i++) {
      const a0 = (i / steps) * turns * Math.PI * 2;
      const a1 = ((i + 1) / steps) * turns * Math.PI * 2;
      const r0 = (i / steps) * maxR;
      const r1 = ((i + 1) / steps) * maxR;
      drawRakeGroove(
        cx + Math.cos(a0) * r0, cy + Math.sin(a0) * r0,
        cx + Math.cos(a1) * r1, cy + Math.sin(a1) * r1
      );
    }
  } else if (name === 'garden') {
    // stones with moss
    addStone(cx - 150, cy - 60);
    addStone(cx + 120, cy + 80);
    addStone(cx - 40, cy + 100);
    addMoss(cx - 170, cy - 30);
    addMoss(cx + 140, cy + 60);
    addMoss(cx - 60, cy + 80);
    addWater(cx + 40, cy - 50);
    drawCircleRake(cx + 40, cy - 50, 80);
    for (let y = 80; y < H - 80; y += rakeWidth * rakeTeeth + 4) {
      drawRakeGroove(60, y, W - 60, y);
    }
  } else if (name === 'minimal') {
    addStone(cx, cy);
    drawCircleRake(cx, cy, 80);
    drawCircleRake(cx, cy, 130);
    drawCircleRake(cx, cy, 180);
  }
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  sandBuffer.width = W;
  sandBuffer.height = H;
  clearSand();
});

requestAnimationFrame(init);
</script>
</body>
</html>
