<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope Painter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 10px 20px;
    background: rgba(20, 20, 30, 0.95);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap;
    z-index: 10;
  }

  .toolbar h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #ff6bca, #7b68ee, #00d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-right: 10px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .control-group label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
  }

  input[type="range"] {
    width: 80px;
    accent-color: #7b68ee;
    cursor: pointer;
  }

  input[type="color"] {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: none;
  }

  .btn {
    padding: 5px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .btn.active {
    background: rgba(123, 104, 238, 0.3);
    border-color: #7b68ee;
    color: #c4b8ff;
  }

  .value-display {
    font-size: 12px;
    color: #7b68ee;
    min-width: 20px;
    text-align: center;
    font-weight: 600;
  }

  .separator {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.1);
  }

  #canvas {
    flex: 1;
    cursor: crosshair;
    display: block;
  }

  .palette {
    display: flex;
    gap: 4px;
  }

  .palette-swatch {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
  }

  .palette-swatch:hover {
    transform: scale(1.15);
  }

  .palette-swatch.active {
    border-color: #fff;
  }

  .brush-preview {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brush-dot {
    border-radius: 50%;
    background: currentColor;
  }

  .mode-buttons {
    display: flex;
    gap: 4px;
  }

  @media (max-width: 900px) {
    .toolbar { gap: 10px; padding: 8px 12px; }
    input[type="range"] { width: 60px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Kaleidoscope</h1>

  <div class="control-group">
    <label>Axes</label>
    <input type="range" id="segments" min="2" max="24" value="8">
    <span class="value-display" id="segmentsVal">8</span>
  </div>

  <div class="separator"></div>

  <div class="control-group">
    <label>Brush</label>
    <input type="range" id="brushSize" min="1" max="40" value="6">
    <div class="brush-preview">
      <div class="brush-dot" id="brushPreview"></div>
    </div>
  </div>

  <div class="separator"></div>

  <div class="control-group">
    <label>Opacity</label>
    <input type="range" id="opacity" min="5" max="100" value="80">
    <span class="value-display" id="opacityVal">80%</span>
  </div>

  <div class="separator"></div>

  <div class="palette" id="palette"></div>
  <input type="color" id="customColor" value="#ff6bca" title="Custom color">

  <div class="separator"></div>

  <div class="mode-buttons">
    <button class="btn active" id="btnDraw" onclick="setMode('draw')">Draw</button>
    <button class="btn" id="btnMirror" onclick="setMode('mirror')">Mirror</button>
    <button class="btn" id="btnGlow" onclick="setMode('glow')">Glow</button>
  </div>

  <div class="separator"></div>

  <button class="btn" onclick="clearCanvas()">Clear</button>
  <button class="btn" onclick="saveImage()">Save</button>
  <button class="btn" id="btnGuides" onclick="toggleGuides()">Guides</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const segmentsInput = document.getElementById('segments');
const brushSizeInput = document.getElementById('brushSize');
const opacityInput = document.getElementById('opacity');
const customColorInput = document.getElementById('customColor');

const presetColors = [
  '#ff6bca', '#ff4757', '#ff8c42', '#ffd93d',
  '#6bcb77', '#00d4ff', '#7b68ee', '#e0e0e0',
  '#ff9ff3', '#48dbfb', '#1dd1a1', '#f368e0'
];

let currentColor = presetColors[0];
let segments = 8;
let brushSize = 6;
let opacity = 0.8;
let drawing = false;
let lastX = null;
let lastY = null;
let mode = 'draw';
let showGuides = false;
let centerX, centerY;

function init() {
  resize();
  buildPalette();
  updateBrushPreview();
  window.addEventListener('resize', resize);
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', handleTouch);
  canvas.addEventListener('touchmove', handleTouch);
  canvas.addEventListener('touchend', stopDraw);

  segmentsInput.addEventListener('input', () => {
    segments = parseInt(segmentsInput.value);
    document.getElementById('segmentsVal').textContent = segments;
    if (showGuides) drawGuides();
  });

  brushSizeInput.addEventListener('input', () => {
    brushSize = parseInt(brushSizeInput.value);
    updateBrushPreview();
  });

  opacityInput.addEventListener('input', () => {
    opacity = parseInt(opacityInput.value) / 100;
    document.getElementById('opacityVal').textContent = opacityInput.value + '%';
    updateBrushPreview();
  });

  customColorInput.addEventListener('input', () => {
    currentColor = customColorInput.value;
    clearActiveSwatch();
    updateBrushPreview();
  });
}

function resize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  centerX = rect.width / 2;
  centerY = rect.height / 2;
  fillBackground();
}

function fillBackground() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}

function buildPalette() {
  const container = document.getElementById('palette');
  presetColors.forEach((color, i) => {
    const swatch = document.createElement('div');
    swatch.className = 'palette-swatch' + (i === 0 ? ' active' : '');
    swatch.style.background = color;
    swatch.onclick = () => {
      currentColor = color;
      customColorInput.value = color;
      clearActiveSwatch();
      swatch.classList.add('active');
      updateBrushPreview();
    };
    container.appendChild(swatch);
  });
}

function clearActiveSwatch() {
  document.querySelectorAll('.palette-swatch').forEach(s => s.classList.remove('active'));
}

function updateBrushPreview() {
  const dot = document.getElementById('brushPreview');
  const size = Math.max(4, brushSize);
  dot.style.width = size + 'px';
  dot.style.height = size + 'px';
  dot.style.color = currentColor;
  dot.style.opacity = opacity;
}

function setMode(m) {
  mode = m;
  document.getElementById('btnDraw').classList.toggle('active', m === 'draw');
  document.getElementById('btnMirror').classList.toggle('active', m === 'mirror');
  document.getElementById('btnGlow').classList.toggle('active', m === 'glow');
}

function toggleGuides() {
  showGuides = !showGuides;
  document.getElementById('btnGuides').classList.toggle('active', showGuides);
  if (!showGuides) {
    // Redraw would be needed but we just leave it for simplicity
  }
}

function drawGuides() {
  ctx.save();
  ctx.strokeStyle = 'rgba(123, 104, 238, 0.15)';
  ctx.lineWidth = 1;
  const angle = (Math.PI * 2) / segments;
  for (let i = 0; i < segments; i++) {
    const a = angle * i;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(
      centerX + Math.cos(a) * Math.max(canvas.width, canvas.height),
      centerY + Math.sin(a) * Math.max(canvas.width, canvas.height)
    );
    ctx.stroke();
  }
  ctx.restore();
}

function handleTouch(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const fakeEvent = {
    clientX: touch.clientX,
    clientY: touch.clientY,
    offsetX: touch.clientX - rect.left,
    offsetY: touch.clientY - rect.top
  };
  if (e.type === 'touchstart') startDraw(fakeEvent);
  else if (e.type === 'touchmove') draw(fakeEvent);
}

function startDraw(e) {
  drawing = true;
  const rect = canvas.getBoundingClientRect();
  lastX = e.clientX - rect.left;
  lastY = e.clientY - rect.top;
  drawSymmetric(lastX, lastY, lastX, lastY);
}

function draw(e) {
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  drawSymmetric(lastX, lastY, x, y);
  lastX = x;
  lastY = y;
}

function stopDraw() {
  drawing = false;
  lastX = null;
  lastY = null;
}

function drawSymmetric(x1, y1, x2, y2) {
  const angle = (Math.PI * 2) / segments;

  const dx1 = x1 - centerX;
  const dy1 = y1 - centerY;
  const dx2 = x2 - centerX;
  const dy2 = y2 - centerY;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = brushSize;

  const hexColor = currentColor;
  const r = parseInt(hexColor.slice(1,3), 16);
  const g = parseInt(hexColor.slice(3,5), 16);
  const b = parseInt(hexColor.slice(5,7), 16);

  for (let i = 0; i < segments; i++) {
    const a = angle * i;
    const cos = Math.cos(a);
    const sin = Math.sin(a);

    const rx1 = centerX + dx1 * cos - dy1 * sin;
    const ry1 = centerY + dx1 * sin + dy1 * cos;
    const rx2 = centerX + dx2 * cos - dy2 * sin;
    const ry2 = centerY + dx2 * sin + dy2 * cos;

    drawStroke(rx1, ry1, rx2, ry2, r, g, b);

    if (mode === 'mirror') {
      const mx1 = centerX + dx1 * cos + dy1 * sin;
      const my1 = centerY + dx1 * sin - dy1 * cos;
      const mx2 = centerX + dx2 * cos + dy2 * sin;
      const my2 = centerY + dx2 * sin - dy2 * cos;
      drawStroke(mx1, my1, mx2, my2, r, g, b);
    }
  }

  if (showGuides) drawGuides();

  ctx.restore();
}

function drawStroke(x1, y1, x2, y2, r, g, b) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);

  if (mode === 'glow') {
    ctx.shadowColor = `rgba(${r},${g},${b},0.6)`;
    ctx.shadowBlur = brushSize * 2;
    ctx.strokeStyle = `rgba(${r},${g},${b},${opacity})`;
    ctx.stroke();
    ctx.shadowBlur = brushSize * 4;
    ctx.strokeStyle = `rgba(${r},${g},${b},${opacity * 0.3})`;
    ctx.lineWidth = brushSize * 0.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.lineWidth = brushSize;
  } else {
    ctx.strokeStyle = `rgba(${r},${g},${b},${opacity})`;
    ctx.stroke();
  }
}

function clearCanvas() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  fillBackground();
}

function saveImage() {
  const link = document.createElement('a');
  link.download = 'kaleidoscope-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

init();
</script>
</body>
</html>
