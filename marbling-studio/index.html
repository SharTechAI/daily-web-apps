<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marbling Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d12; color: #e8e8f0; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; }

.sidebar {
  width: 280px; min-width: 280px; background: #14141a; border-right: 1px solid #2a2a35;
  display: flex; flex-direction: column; height: 100vh; overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #3a3a45; border-radius: 2px; }

.sidebar h1 { font-size: 1.2rem; padding: 20px 18px 6px; letter-spacing: -0.3px; }
.sidebar .sub { font-size: 0.72rem; color: #6a6a7c; padding: 0 18px 16px; }

.section { padding: 12px 18px; border-top: 1px solid #2a2a35; }
.section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #6a6a7c; margin-bottom: 10px; font-weight: 600; }

.tool-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.tool-btn {
  flex: 1; min-width: 60px; padding: 8px 6px; border-radius: 8px; border: 1px solid #2a2a35;
  background: #1a1a22; color: #b0b0c0; font-size: 0.72rem; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.tool-btn:hover { border-color: #4a4a5a; background: #22222c; }
.tool-btn.active { border-color: #7c6ff7; background: #2a2540; color: #c4bbff; }

.color-palette { display: flex; gap: 6px; flex-wrap: wrap; }
.color-swatch {
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
  transition: all 0.15s; position: relative;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }

.slider-group { margin-bottom: 10px; }
.slider-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: #8a8a9c; margin-bottom: 4px; }
.slider-label span:last-child { color: #7c6ff7; font-weight: 600; }
input[type="range"] {
  width: 100%; height: 4px; -webkit-appearance: none; background: #2a2a35; border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: #7c6ff7; cursor: pointer; border: 2px solid #1a1a22;
}

.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.preset-btn {
  padding: 8px 6px; border-radius: 8px; border: 1px solid #2a2a35;
  background: #1a1a22; color: #b0b0c0; font-size: 0.7rem; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.preset-btn:hover { border-color: #4a4a5a; background: #22222c; }

.action-row { display: flex; gap: 6px; }
.action-btn {
  flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid #2a2a35;
  background: #1a1a22; color: #b0b0c0; font-size: 0.72rem; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.action-btn:hover { border-color: #4a4a5a; background: #22222c; }
.action-btn.primary { background: #7c6ff7; color: #fff; border-color: #7c6ff7; }
.action-btn.primary:hover { background: #6a5de0; }

.canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
canvas { border-radius: 12px; cursor: crosshair; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }

.hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,26,0.85); border: 1px solid #2a2a35; border-radius: 20px;
  padding: 8px 20px; font-size: 0.72rem; color: #6a6a7c; white-space: nowrap;
  backdrop-filter: blur(8px); pointer-events: none;
}

.palette-row { display: flex; gap: 6px; margin-bottom: 8px; }
.palette-label {
  font-size: 0.65rem; color: #5a5a6c; margin-bottom: 4px;
}

@media (max-width: 800px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; height: auto; max-height: 40vh; flex-direction: row; flex-wrap: wrap; }
  .section { flex: 1; min-width: 200px; }
  .canvas-area { flex: 1; min-height: 50vh; }
}
</style>
</head>
<body>

<div class="sidebar">
  <h1>🎨 Marbling Studio</h1>
  <div class="sub">Digital paper marbling &mdash; Ebru art technique</div>

  <div class="section">
    <div class="section-title">Tool</div>
    <div class="tool-row">
      <button class="tool-btn active" data-tool="drop" title="Click to drop paint">💧 Drop</button>
      <button class="tool-btn" data-tool="stylus" title="Drag to swirl paint">✏️ Stylus</button>
      <button class="tool-btn" data-tool="comb" title="Drag to comb through paint">〰️ Comb</button>
      <button class="tool-btn" data-tool="rake" title="Drag to rake paint">⫼ Rake</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="palette-label">Classic Palette</div>
    <div class="color-palette" id="palette-classic"></div>
    <div class="palette-label" style="margin-top:8px">Vivid Palette</div>
    <div class="color-palette" id="palette-vivid"></div>
    <div class="palette-label" style="margin-top:8px">Pastel Palette</div>
    <div class="color-palette" id="palette-pastel"></div>
    <div style="margin-top:8px">
      <input type="color" id="customColor" value="#e63946" style="width:100%;height:32px;border:none;border-radius:8px;cursor:pointer;background:none;">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Drop Size</div>
    <div class="slider-group">
      <div class="slider-label"><span>Radius</span><span id="radiusVal">40</span></div>
      <input type="range" id="dropRadius" min="15" max="120" value="40">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stylus / Comb</div>
    <div class="slider-group">
      <div class="slider-label"><span>Strength</span><span id="strengthVal">60</span></div>
      <input type="range" id="toolStrength" min="10" max="150" value="60">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Comb Teeth</span><span id="teethVal">8</span></div>
      <input type="range" id="combTeeth" min="3" max="20" value="8">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Background</div>
    <div class="color-palette" id="bgPalette"></div>
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <button class="preset-btn" data-preset="stone">🪨 Stone</button>
      <button class="preset-btn" data-preset="feather">🪶 Feather</button>
      <button class="preset-btn" data-preset="peacock">🦚 Peacock</button>
      <button class="preset-btn" data-preset="gelgit">🌊 Gel-Git</button>
      <button class="preset-btn" data-preset="nonpareil">🔴 Nonpareil</button>
      <button class="preset-btn" data-preset="bouquet">💐 Bouquet</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Actions</div>
    <div class="action-row" style="margin-bottom:6px">
      <button class="action-btn" id="undoBtn">↩ Undo</button>
      <button class="action-btn" id="clearBtn">✕ Clear</button>
    </div>
    <div class="action-row">
      <button class="action-btn primary" id="exportBtn">📥 Export PNG</button>
    </div>
  </div>
</div>

<div class="canvas-area">
  <canvas id="canvas"></canvas>
  <div class="hint" id="hint">Click to drop paint, or select a tool from the sidebar</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  const area = document.querySelector('.canvas-area');
  const pad = 40;
  const maxW = area.clientWidth - pad;
  const maxH = area.clientHeight - pad;
  const aspect = 4 / 3;
  if (maxW / aspect <= maxH) {
    W = Math.floor(maxW);
    H = Math.floor(maxW / aspect);
  } else {
    H = Math.floor(maxH);
    W = Math.floor(maxH * aspect);
  }
  W = Math.max(W, 300);
  H = Math.max(H, 225);
  canvas.width = W;
  canvas.height = H;
  redraw();
}

const classicColors = ['#1a1a2e', '#e63946', '#264653', '#e9c46a', '#2a9d8f', '#f4a261', '#606c38', '#bc6c25'];
const vividColors = ['#ff006e', '#3a86ff', '#ffbe0b', '#8338ec', '#06d6a0', '#fb5607', '#00f5d4', '#ef476f'];
const pastelColors = ['#fec5bb', '#a2d2ff', '#bde0fe', '#caffbf', '#ffd6ff', '#fdffb6', '#d0f4de', '#e4c1f9'];
const bgColors = ['#f5f0e8', '#e8e0d0', '#faf3eb', '#ddd5c8', '#1a1a2e', '#0a1628', '#2d1b1b', '#1b2d1b'];

let currentColor = classicColors[1];
let currentTool = 'drop';
let dropRadius = 40;
let toolStrength = 60;
let combTeeth = 8;
let bgColor = '#f5f0e8';

let drops = [];
let history = [];
const MAX_HISTORY = 30;

function buildPalette(containerId, colors, isBg) {
  const el = document.getElementById(containerId);
  colors.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c;
    if (!isBg && c === currentColor) sw.classList.add('active');
    if (isBg && c === bgColor) sw.classList.add('active');
    sw.addEventListener('click', () => {
      if (isBg) {
        bgColor = c;
        el.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        redraw();
      } else {
        currentColor = c;
        document.querySelectorAll('#palette-classic .color-swatch, #palette-vivid .color-swatch, #palette-pastel .color-swatch')
          .forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
      }
    });
    el.appendChild(sw);
  });
}

buildPalette('palette-classic', classicColors, false);
buildPalette('palette-vivid', vividColors, false);
buildPalette('palette-pastel', pastelColors, false);
buildPalette('bgPalette', bgColors, true);

document.getElementById('customColor').addEventListener('input', e => {
  currentColor = e.target.value;
  document.querySelectorAll('#palette-classic .color-swatch, #palette-vivid .color-swatch, #palette-pastel .color-swatch')
    .forEach(s => s.classList.remove('active'));
});

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    updateHint();
  });
});

const radiusSlider = document.getElementById('dropRadius');
const strengthSlider = document.getElementById('toolStrength');
const teethSlider = document.getElementById('combTeeth');

radiusSlider.addEventListener('input', e => { dropRadius = +e.target.value; document.getElementById('radiusVal').textContent = dropRadius; });
strengthSlider.addEventListener('input', e => { toolStrength = +e.target.value; document.getElementById('strengthVal').textContent = toolStrength; });
teethSlider.addEventListener('input', e => { combTeeth = +e.target.value; document.getElementById('teethVal').textContent = combTeeth; });

function updateHint() {
  const hints = {
    drop: 'Click to drop paint onto the surface',
    stylus: 'Click and drag to swirl the paint',
    comb: 'Click and drag to comb through the paint',
    rake: 'Click and drag to rake across the surface'
  };
  hint.textContent = hints[currentTool];
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function saveState() {
  if (history.length >= MAX_HISTORY) history.shift();
  history.push(JSON.parse(JSON.stringify(drops)));
}

function addDrop(x, y, radius, color) {
  saveState();
  const [r, g, b] = hexToRgb(color);
  const drop = { x, y, radius, color, r, g, b, points: [] };

  const numPoints = 120;
  for (let i = 0; i < numPoints; i++) {
    const angle = (i / numPoints) * Math.PI * 2;
    drop.points.push({
      x: x + Math.cos(angle) * radius,
      y: y + Math.sin(angle) * radius
    });
  }

  pushExistingDrops(drop);
  drops.push(drop);
  redraw();
  hint.style.opacity = '0';
}

function pushExistingDrops(newDrop) {
  const cx = newDrop.x;
  const cy = newDrop.y;
  const R = newDrop.radius;

  for (const drop of drops) {
    for (const pt of drop.points) {
      const dx = pt.x - cx;
      const dy = pt.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < R * 2.5 && dist > 0.1) {
        const pushFactor = R * R / (dist * dist + R * 0.5);
        const nx = dx / dist;
        const ny = dy / dist;
        pt.x += nx * pushFactor * 1.2;
        pt.y += ny * pushFactor * 1.2;
      }
    }
  }
}

function applyTool(x, y, prevX, prevY, toolType) {
  const dx = x - prevX;
  const dy = y - prevY;
  const moveDist = Math.sqrt(dx * dx + dy * dy);
  if (moveDist < 1) return;

  const nx = dx / moveDist;
  const ny = dy / moveDist;
  const strength = toolStrength;

  for (const drop of drops) {
    for (const pt of drop.points) {
      const px = pt.x - x;
      const py = pt.y - y;

      if (toolType === 'stylus') {
        const dist = Math.sqrt(px * px + py * py);
        if (dist < strength * 2) {
          const factor = Math.exp(-dist * dist / (strength * strength * 0.8));
          pt.x += nx * moveDist * factor * 0.8;
          pt.y += ny * moveDist * factor * 0.8;

          const perpX = -ny;
          const perpY = nx;
          const cross = px * ny - py * nx;
          const swirlFactor = factor * 0.3 * Math.sign(cross);
          pt.x += perpX * moveDist * swirlFactor;
          pt.y += perpY * moveDist * swirlFactor;
        }
      } else if (toolType === 'comb') {
        const perpDist = px * (-ny) + py * nx;
        const teeth = combTeeth;
        const spacing = (strength * 3) / teeth;

        for (let t = 0; t < teeth; t++) {
          const toothOffset = (t - (teeth - 1) / 2) * spacing;
          const toothDist = Math.abs(perpDist - toothOffset);
          if (toothDist < spacing * 0.4) {
            const alongDist = px * nx + py * ny;
            const totalDist = Math.sqrt(toothDist * toothDist + alongDist * alongDist);
            if (totalDist < strength) {
              const factor = Math.exp(-totalDist * totalDist / (strength * strength * 0.3));
              pt.x += nx * moveDist * factor * 0.6;
              pt.y += ny * moveDist * factor * 0.6;
            }
          }
        }
      } else if (toolType === 'rake') {
        const perpDist = px * (-ny) + py * nx;
        const spacing = 12;
        const numTines = Math.floor((strength * 3) / spacing);

        for (let t = 0; t < numTines; t++) {
          const tineOffset = (t - (numTines - 1) / 2) * spacing;
          const tineDist = Math.abs(perpDist - tineOffset);
          if (tineDist < 6) {
            const alongDist = px * nx + py * ny;
            const totalDist = Math.sqrt(tineDist * tineDist + alongDist * alongDist);
            if (totalDist < strength * 0.8) {
              const factor = Math.exp(-totalDist * totalDist / (strength * strength * 0.2));
              pt.x += nx * moveDist * factor * 0.7;
              pt.y += ny * moveDist * factor * 0.7;
            }
          }
        }
      }
    }
  }
  redraw();
}

function redraw() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  for (const drop of drops) {
    if (drop.points.length < 3) continue;

    ctx.beginPath();
    ctx.moveTo(drop.points[0].x, drop.points[0].y);

    for (let i = 0; i < drop.points.length; i++) {
      const curr = drop.points[i];
      const next = drop.points[(i + 1) % drop.points.length];
      const next2 = drop.points[(i + 2) % drop.points.length];

      const cpx = (curr.x + next.x) / 2;
      const cpy = (curr.y + next.y) / 2;
      const cpx2 = (next.x + next2.x) / 2;
      const cpy2 = (next.y + next2.y) / 2;

      ctx.quadraticCurveTo(next.x, next.y, cpx2, cpy2);
    }

    ctx.closePath();

    const grad = ctx.createRadialGradient(
      drop.x, drop.y, 0,
      drop.x, drop.y, drop.radius * 1.5
    );
    const base = `rgb(${drop.r},${drop.g},${drop.b})`;
    const lighter = `rgb(${Math.min(255, drop.r + 30)},${Math.min(255, drop.g + 30)},${Math.min(255, drop.b + 30)})`;
    const darker = `rgb(${Math.max(0, drop.r - 20)},${Math.max(0, drop.g - 20)},${Math.max(0, drop.b - 20)})`;

    grad.addColorStop(0, lighter);
    grad.addColorStop(0.5, base);
    grad.addColorStop(1, darker);

    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = `rgba(${Math.max(0, drop.r - 40)},${Math.max(0, drop.g - 40)},${Math.max(0, drop.b - 40)},0.3)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

let isDown = false;
let lastX, lastY;
let toolSaveOnce = false;

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);

  if (currentTool === 'drop') {
    addDrop(x, y, dropRadius, currentColor);
  } else {
    isDown = true;
    lastX = x;
    lastY = y;
    toolSaveOnce = false;
  }
});

canvas.addEventListener('mousemove', e => {
  if (!isDown) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);

  if (!toolSaveOnce) {
    saveState();
    toolSaveOnce = true;
  }

  applyTool(x, y, lastX, lastY, currentTool);
  lastX = x;
  lastY = y;
});

canvas.addEventListener('mouseup', () => { isDown = false; });
canvas.addEventListener('mouseleave', () => { isDown = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (t.clientX - rect.left) * (W / rect.width);
  const y = (t.clientY - rect.top) * (H / rect.height);
  if (currentTool === 'drop') {
    addDrop(x, y, dropRadius, currentColor);
  } else {
    isDown = true;
    lastX = x;
    lastY = y;
    toolSaveOnce = false;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDown) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (t.clientX - rect.left) * (W / rect.width);
  const y = (t.clientY - rect.top) * (H / rect.height);
  if (!toolSaveOnce) { saveState(); toolSaveOnce = true; }
  applyTool(x, y, lastX, lastY, currentTool);
  lastX = x;
  lastY = y;
}, { passive: false });

canvas.addEventListener('touchend', () => { isDown = false; });

document.getElementById('undoBtn').addEventListener('click', () => {
  if (history.length > 0) {
    drops = history.pop();
    redraw();
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  saveState();
  drops = [];
  redraw();
  hint.style.opacity = '1';
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'marbling-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

function runPreset(name) {
  drops = [];
  history = [];

  const presets = {
    stone() {
      const stoneColors = ['#8d6e63', '#a1887f', '#d7ccc8', '#795548', '#4e342e', '#bcaaa4', '#6d4c41', '#efebe9'];
      for (let i = 0; i < 35; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        const r = 20 + Math.random() * 50;
        addDropSilent(x, y, r, stoneColors[Math.floor(Math.random() * stoneColors.length)]);
      }
      for (let sweep = 0; sweep < 3; sweep++) {
        const sy = (H / 4) + (sweep * H / 4);
        for (let sx = 0; sx < W; sx += 4) {
          applyTool(sx, sy + Math.sin(sx * 0.03) * 30, sx - 4, sy + Math.sin((sx - 4) * 0.03) * 30, 'stylus');
        }
      }
    },
    feather() {
      const featherColors = ['#e63946', '#457b9d', '#1d3557', '#f1faee', '#a8dadc', '#e9c46a'];
      for (let i = 0; i < 20; i++) {
        const x = W * 0.2 + Math.random() * W * 0.6;
        const y = Math.random() * H;
        addDropSilent(x, y, 25 + Math.random() * 40, featherColors[i % featherColors.length]);
      }
      const centerX = W / 2;
      for (let y = 0; y < H; y += 3) {
        const offset = Math.sin(y * 0.04) * 40;
        applyTool(centerX + offset, y, centerX + Math.sin((y - 3) * 0.04) * 40, y - 3, 'stylus');
      }
    },
    peacock() {
      const pColors = ['#006d77', '#83c5be', '#ffddd2', '#e29578', '#264653', '#2a9d8f', '#e76f51'];
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 6; col++) {
          const x = (W / 7) * (col + 1) + (row % 2) * (W / 14);
          const y = (H / 5) * (row + 1);
          addDropSilent(x, y, 30 + Math.random() * 20, pColors[(row * 6 + col) % pColors.length]);
        }
      }
      for (let col = 0; col < 7; col++) {
        const x = (W / 7) * col + W / 14;
        for (let y = 0; y < H; y += 3) {
          const dir = col % 2 === 0 ? 1 : -1;
          applyTool(x, y, x, y - 3 * dir, 'stylus');
        }
      }
    },
    gelgit() {
      const gColors = ['#e63946', '#264653', '#2a9d8f', '#e9c46a', '#f4a261', '#606c38'];
      for (let i = 0; i < 25; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        addDropSilent(x, y, 30 + Math.random() * 35, gColors[i % gColors.length]);
      }
      for (let y = 20; y < H; y += 50) {
        for (let x = 0; x < W; x += 3) {
          applyTool(x, y, x - 3, y, 'comb');
        }
      }
      for (let x = 20; x < W; x += 50) {
        for (let y = H; y > 0; y -= 3) {
          applyTool(x, y, x, y + 3, 'comb');
        }
      }
    },
    nonpareil() {
      const nColors = ['#e63946', '#1d3557', '#e9c46a', '#2a9d8f', '#f4a261', '#264653'];
      for (let i = 0; i < 40; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        addDropSilent(x, y, 15 + Math.random() * 25, nColors[i % nColors.length]);
      }
      for (let y = 30; y < H; y += 60) {
        for (let x = 0; x < W; x += 3) {
          applyTool(x, y, x - 3, y, 'rake');
        }
      }
    },
    bouquet() {
      const bColors = ['#ff006e', '#8338ec', '#3a86ff', '#06d6a0', '#ffbe0b', '#fb5607', '#ef476f', '#00f5d4'];
      const cx = W / 2;
      const cy = H / 2;
      for (let ring = 0; ring < 3; ring++) {
        const n = 6 + ring * 4;
        const r = 60 + ring * 70;
        for (let i = 0; i < n; i++) {
          const angle = (i / n) * Math.PI * 2;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          addDropSilent(x, y, 25 + Math.random() * 20, bColors[(ring * n + i) % bColors.length]);
        }
      }
      addDropSilent(cx, cy, 40, '#ffbe0b');

      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        for (let d = 30; d < 200; d += 4) {
          const x = cx + Math.cos(angle) * d;
          const y = cy + Math.sin(angle) * d;
          const px = cx + Math.cos(angle) * (d - 4);
          const py = cy + Math.sin(angle) * (d - 4);
          applyTool(x, y, px, py, 'stylus');
        }
      }
    }
  };

  if (presets[name]) {
    presets[name]();
    redraw();
    hint.style.opacity = '0';
  }
}

function addDropSilent(x, y, radius, color) {
  const [r, g, b] = hexToRgb(color);
  const drop = { x, y, radius, color, r, g, b, points: [] };
  const numPoints = 120;
  for (let i = 0; i < numPoints; i++) {
    const angle = (i / numPoints) * Math.PI * 2;
    drop.points.push({
      x: x + Math.cos(angle) * radius,
      y: y + Math.sin(angle) * radius
    });
  }
  pushExistingDrops(drop);
  drops.push(drop);
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => runPreset(btn.dataset.preset));
});

window.addEventListener('resize', resize);
resize();
</script>
