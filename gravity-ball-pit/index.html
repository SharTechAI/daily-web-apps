<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Ball Pit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #title {
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(120, 80, 255, 0.6);
    letter-spacing: 1px;
  }
  #subtitle {
    font-size: 13px;
    color: #888;
  }
  #stats {
    font-size: 12px;
    color: #666;
    font-family: monospace;
  }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  button.active {
    background: rgba(120, 80, 255, 0.3);
    border-color: rgba(120, 80, 255, 0.6);
    color: #fff;
  }
  #gravity-slider {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #7850ff;
    border-radius: 50%;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="title">Gravity Ball Pit</div>
  <div id="subtitle">Click or drag to drop balls. Scroll to change size.</div>
  <div id="stats"></div>
</div>
<div id="controls">
  <button id="btn-clear">Clear All</button>
  <button id="btn-shake">Shake!</button>
  <button id="btn-antigrav" class="">Anti-Gravity</button>
  <div id="gravity-slider">
    <span style="font-size:12px;color:#888;">Gravity</span>
    <input type="range" id="gravity" min="0" max="2" step="0.05" value="0.5">
  </div>
</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PALETTES = [
  ['#FF6B6B','#FFA07A','#FFD93D','#6BCB77','#4D96FF','#9B59B6'],
  ['#F72585','#B5179E','#7209B7','#560BAD','#480CA8','#3A0CA3'],
  ['#00F5D4','#00BBF9','#FEE440','#F15BB5','#9B5DE5','#00C49A'],
  ['#FF595E','#FFCA3A','#8AC926','#1982C4','#6A4C93','#FF924C'],
];

let balls = [];
let gravity = 0.5;
let antiGrav = false;
let dropRadius = 18;
let mouseDown = false;
let mouseX = 0, mouseY = 0;
let shakeTimer = 0;

class Ball {
  constructor(x, y, r) {
    this.x = x;
    this.y = y;
    this.r = r;
    this.mass = r * r;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 2;
    const palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.glow = Math.random() * 0.4 + 0.2;
  }

  update(dt) {
    const g = antiGrav ? -gravity : gravity;
    this.vy += g * dt;

    if (shakeTimer > 0) {
      this.vx += (Math.random() - 0.5) * 15;
      this.vy += (Math.random() - 0.5) * 15;
    }

    this.vx *= 0.999;
    this.vy *= 0.999;

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Wall collisions
    const bounce = 0.7;
    if (this.x - this.r < 0) { this.x = this.r; this.vx = Math.abs(this.vx) * bounce; }
    if (this.x + this.r > W) { this.x = W - this.r; this.vx = -Math.abs(this.vx) * bounce; }
    if (this.y - this.r < 0) { this.y = this.r; this.vy = Math.abs(this.vy) * bounce; }
    if (this.y + this.r > H) { this.y = H - this.r; this.vy = -Math.abs(this.vy) * bounce; }
  }

  draw() {
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);

    // Glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.r * this.glow;
    ctx.fillStyle = this.color;
    ctx.fill();

    // Highlight
    const grad = ctx.createRadialGradient(
      this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
      this.x, this.y, this.r
    );
    grad.addColorStop(0, 'rgba(255,255,255,0.35)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
  }
}

function resolveCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.r + b.r;

      if (dist < minDist && dist > 0.001) {
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = minDist - dist;

        // Separate
        const totalMass = a.mass + b.mass;
        a.x -= nx * overlap * (b.mass / totalMass);
        a.y -= ny * overlap * (b.mass / totalMass);
        b.x += nx * overlap * (a.mass / totalMass);
        b.y += ny * overlap * (a.mass / totalMass);

        // Elastic collision response
        const dvx = a.vx - b.vx;
        const dvy = a.vy - b.vy;
        const dvDotN = dvx * nx + dvy * ny;

        if (dvDotN > 0) {
          const restitution = 0.8;
          const impulse = (2 * dvDotN * restitution) / totalMass;
          a.vx -= impulse * b.mass * nx;
          a.vy -= impulse * b.mass * ny;
          b.vx += impulse * a.mass * nx;
          b.vy += impulse * a.mass * ny;
        }
      }
    }
  }
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 16, 3);
  lastTime = now;

  if (shakeTimer > 0) shakeTimer -= dt;

  // Spawn balls while mouse held
  if (mouseDown && balls.length < 500) {
    balls.push(new Ball(
      mouseX + (Math.random() - 0.5) * 10,
      mouseY + (Math.random() - 0.5) * 10,
      dropRadius + (Math.random() - 0.5) * 6
    ));
  }

  for (const b of balls) b.update(dt);
  resolveCollisions();

  // Draw
  ctx.fillStyle = 'rgba(10, 10, 26, 0.25)';
  ctx.fillRect(0, 0, W, H);

  for (const b of balls) b.draw();

  stats.textContent = `Balls: ${balls.length} | FPS: ${Math.round(1000 / (now - lastTime + 16))}`;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Input
canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  dropRadius = Math.max(5, Math.min(60, dropRadius - e.deltaY * 0.05));
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => mouseDown = false);

// Controls
document.getElementById('btn-clear').addEventListener('click', () => balls = []);
document.getElementById('btn-shake').addEventListener('click', () => shakeTimer = 10);
const btnAnti = document.getElementById('btn-antigrav');
btnAnti.addEventListener('click', () => {
  antiGrav = !antiGrav;
  btnAnti.classList.toggle('active', antiGrav);
});
document.getElementById('gravity').addEventListener('input', (e) => {
  gravity = parseFloat(e.target.value);
});
</script>
</body>
</html>
