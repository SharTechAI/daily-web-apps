<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Orrery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e8e8f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  canvas { display: block; }

  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-panel {
    background: rgba(16, 16, 24, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px 20px;
  }

  .panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .speed-controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .speed-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.78rem;
    font-family: inherit;
    transition: all 0.2s;
  }

  .speed-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .speed-btn.active { background: rgba(124,111,247,0.3); border-color: rgba(124,111,247,0.5); color: #fff; }

  .speed-label {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.5);
    min-width: 80px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .view-controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .toggle-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #aaa;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.72rem;
    font-family: inherit;
    transition: all 0.2s;
  }

  .toggle-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .toggle-btn.active { background: rgba(94,231,183,0.2); border-color: rgba(94,231,183,0.4); color: #5ee7b7; }

  #planet-info {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(16, 16, 24, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 20px 28px;
    display: none;
    min-width: 340px;
    max-width: 500px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .info-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .info-color {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .info-name {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .info-subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    margin-top: 1px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .info-stat {
    text-align: center;
  }

  .info-stat-value {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .info-stat-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }

  #title-bar {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    text-align: right;
  }

  #title-bar h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: rgba(255,255,255,0.7);
  }

  #title-bar .subtitle {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    margin-top: 3px;
  }

  #zoom-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    text-align: right;
    line-height: 1.6;
  }

  .asteroid-belt-label {
    position: absolute;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="controls">
  <div class="control-panel">
    <div class="panel-title">Time</div>
    <div class="speed-controls">
      <button class="speed-btn" onclick="setSpeed(event,0)">⏸</button>
      <button class="speed-btn" onclick="setSpeed(event,0.25)">¼×</button>
      <button class="speed-btn active" onclick="setSpeed(event,1)">1×</button>
      <button class="speed-btn" onclick="setSpeed(event,5)">5×</button>
      <button class="speed-btn" onclick="setSpeed(event,20)">20×</button>
      <button class="speed-btn" onclick="setSpeed(event,100)">100×</button>
      <div class="speed-label" id="speed-label">1× speed</div>
    </div>
  </div>

  <div class="control-panel">
    <div class="panel-title">Display</div>
    <div class="view-controls">
      <button class="toggle-btn active" id="btn-orbits" onclick="toggle('orbits')">Orbits</button>
      <button class="toggle-btn active" id="btn-labels" onclick="toggle('labels')">Labels</button>
      <button class="toggle-btn" id="btn-trails" onclick="toggle('trails')">Trails</button>
      <button class="toggle-btn active" id="btn-glow" onclick="toggle('glow')">Glow</button>
      <button class="toggle-btn" id="btn-distances" onclick="toggle('distances')">Distances</button>
      <button class="toggle-btn active" id="btn-asteroids" onclick="toggle('asteroids')">Asteroids</button>
    </div>
  </div>
</div>

<div id="title-bar">
  <h1>Solar System Orrery</h1>
  <div class="subtitle">Interactive Orbital Simulation</div>
</div>

<div id="zoom-hint">
  Scroll to zoom · Drag to pan<br>
  Click a planet for info
</div>

<div id="planet-info">
  <div class="info-header">
    <div class="info-color" id="info-color"></div>
    <div>
      <div class="info-name" id="info-name"></div>
      <div class="info-subtitle" id="info-subtitle"></div>
    </div>
  </div>
  <div class="info-grid" id="info-grid"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let camera = { x: 0, y: 0, zoom: 0.22 };
let timeSpeed = 1;
let time = 0;
let showOrbits = true;
let showLabels = true;
let showTrails = false;
let showGlow = true;
let showDistances = false;
let showAsteroids = true;
let selectedPlanet = null;
let hoveredPlanet = null;

const AU = 100;

const planets = [
  {
    name: 'Mercury', type: 'Terrestrial',
    distance: 0.387, period: 0.241, size: 4,
    color: '#b5a68e', glowColor: 'rgba(181,166,142,0.3)',
    diameter: '4,879 km', dayLength: '59 days', moons: 0,
    gravity: '3.7 m/s²', temp: '167°C avg', atmosphere: 'Minimal',
    fact: 'Smallest planet, extreme temperature swings'
  },
  {
    name: 'Venus', type: 'Terrestrial',
    distance: 0.723, period: 0.615, size: 7,
    color: '#e8c468', glowColor: 'rgba(232,196,104,0.3)',
    diameter: '12,104 km', dayLength: '243 days', moons: 0,
    gravity: '8.87 m/s²', temp: '464°C', atmosphere: 'CO₂ (thick)',
    fact: 'Hottest planet, rotates backwards'
  },
  {
    name: 'Earth', type: 'Terrestrial',
    distance: 1.0, period: 1.0, size: 7.5,
    color: '#4da6ff', glowColor: 'rgba(77,166,255,0.35)',
    diameter: '12,742 km', dayLength: '24 hours', moons: 1,
    gravity: '9.81 m/s²', temp: '15°C avg', atmosphere: 'N₂ / O₂',
    fact: 'Only known planet with life'
  },
  {
    name: 'Mars', type: 'Terrestrial',
    distance: 1.524, period: 1.881, size: 5.5,
    color: '#e07040', glowColor: 'rgba(224,112,64,0.3)',
    diameter: '6,779 km', dayLength: '24h 37m', moons: 2,
    gravity: '3.72 m/s²', temp: '−65°C avg', atmosphere: 'CO₂ (thin)',
    fact: 'Has the largest volcano — Olympus Mons'
  },
  {
    name: 'Jupiter', type: 'Gas Giant',
    distance: 5.203, period: 11.86, size: 20,
    color: '#d4a574', glowColor: 'rgba(212,165,116,0.25)',
    diameter: '139,820 km', dayLength: '9h 56m', moons: 95,
    gravity: '24.79 m/s²', temp: '−110°C', atmosphere: 'H₂ / He',
    fact: 'Largest planet, Great Red Spot storm'
  },
  {
    name: 'Saturn', type: 'Gas Giant',
    distance: 9.537, period: 29.46, size: 17,
    color: '#e8d08c', glowColor: 'rgba(232,208,140,0.25)',
    ringColor: 'rgba(210,190,140,0.35)', ringWidth: 28,
    diameter: '116,460 km', dayLength: '10h 42m', moons: 146,
    gravity: '10.44 m/s²', temp: '−140°C', atmosphere: 'H₂ / He',
    fact: 'Iconic rings made of ice and rock'
  },
  {
    name: 'Uranus', type: 'Ice Giant',
    distance: 19.19, period: 84.01, size: 12,
    color: '#7ec8c8', glowColor: 'rgba(126,200,200,0.25)',
    diameter: '50,724 km', dayLength: '17h 14m', moons: 28,
    gravity: '8.87 m/s²', temp: '−195°C', atmosphere: 'H₂ / He / CH₄',
    fact: 'Tilted 98° — rolls around the Sun'
  },
  {
    name: 'Neptune', type: 'Ice Giant',
    distance: 30.07, period: 164.8, size: 11,
    color: '#4466dd', glowColor: 'rgba(68,102,221,0.3)',
    diameter: '49,244 km', dayLength: '16h 6m', moons: 16,
    gravity: '11.15 m/s²', temp: '−200°C', atmosphere: 'H₂ / He / CH₄',
    fact: 'Strongest winds in the solar system (2,100 km/h)'
  }
];

const trails = planets.map(() => []);
const maxTrailLength = 600;

const stars = [];
for (let i = 0; i < 800; i++) {
  stars.push({
    x: Math.random() * 4000 - 2000,
    y: Math.random() * 4000 - 2000,
    size: Math.random() * 1.5 + 0.3,
    brightness: Math.random() * 0.5 + 0.5,
    twinkleSpeed: Math.random() * 2 + 1
  });
}

const asteroids = [];
for (let i = 0; i < 300; i++) {
  const dist = 2.2 + Math.random() * 1.2;
  asteroids.push({
    distance: dist,
    angle: Math.random() * Math.PI * 2,
    speed: 0.15 / Math.pow(dist, 1.5),
    size: Math.random() * 1.2 + 0.3,
    brightness: Math.random() * 0.3 + 0.15,
    offset: (Math.random() - 0.5) * 0.3
  });
}

function worldToScreen(wx, wy) {
  return {
    x: W / 2 + (wx - camera.x) * camera.zoom,
    y: H / 2 + (wy - camera.y) * camera.zoom
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camera.zoom + camera.x,
    y: (sy - H / 2) / camera.zoom + camera.y
  };
}

function scaleDistance(d) {
  return Math.pow(d, 0.55) * AU * 2.2;
}

function getPlanetPos(planet, t) {
  const angle = (t / planet.period) * Math.PI * 2;
  const e = planet.name === 'Mercury' ? 0.205 : planet.name === 'Mars' ? 0.093 : 0.017;
  const r = scaleDistance(planet.distance) * (1 - e * 0.3 * Math.cos(angle));
  return {
    x: r * Math.cos(angle),
    y: r * Math.sin(angle)
  };
}

function drawStars() {
  const t = Date.now() / 1000;
  for (const star of stars) {
    const sp = worldToScreen(star.x, star.y);
    if (sp.x < -10 || sp.x > W + 10 || sp.y < -10 || sp.y > H + 10) continue;
    const twinkle = 0.6 + 0.4 * Math.sin(t * star.twinkleSpeed + star.x);
    const alpha = star.brightness * twinkle;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, star.size * Math.min(camera.zoom * 0.3 + 0.7, 1.5), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSun() {
  const sp = worldToScreen(0, 0);
  const baseSize = Math.max(22 * camera.zoom, 8);
  const t = Date.now() / 1000;

  if (showGlow) {
    const grad = ctx.createRadialGradient(sp.x, sp.y, baseSize * 0.5, sp.x, sp.y, baseSize * 5);
    grad.addColorStop(0, 'rgba(255,200,50,0.25)');
    grad.addColorStop(0.3, 'rgba(255,150,30,0.1)');
    grad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, baseSize * 5, 0, Math.PI * 2);
    ctx.fill();

    const coronaSize = baseSize * (3 + 0.3 * Math.sin(t * 0.5));
    const corona = ctx.createRadialGradient(sp.x, sp.y, baseSize, sp.x, sp.y, coronaSize);
    corona.addColorStop(0, 'rgba(255,180,50,0.4)');
    corona.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = corona;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, coronaSize, 0, Math.PI * 2);
    ctx.fill();
  }

  const sunGrad = ctx.createRadialGradient(
    sp.x - baseSize * 0.2, sp.y - baseSize * 0.2, 0,
    sp.x, sp.y, baseSize
  );
  sunGrad.addColorStop(0, '#fff8e0');
  sunGrad.addColorStop(0.3, '#ffe44d');
  sunGrad.addColorStop(0.7, '#ffaa00');
  sunGrad.addColorStop(1, '#ff6600');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(sp.x, sp.y, baseSize, 0, Math.PI * 2);
  ctx.fill();
}

function drawOrbit(planet) {
  const steps = 120;
  const baseR = scaleDistance(planet.distance);
  const e = planet.name === 'Mercury' ? 0.205 : planet.name === 'Mars' ? 0.093 : 0.017;

  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let i = 0; i <= steps; i++) {
    const angle = (i / steps) * Math.PI * 2;
    const r = baseR * (1 - e * 0.3 * Math.cos(angle));
    const sp = worldToScreen(r * Math.cos(angle), r * Math.sin(angle));
    if (i === 0) ctx.moveTo(sp.x, sp.y);
    else ctx.lineTo(sp.x, sp.y);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawTrail(index) {
  const trail = trails[index];
  if (trail.length < 2) return;
  const planet = planets[index];

  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';

  for (let i = 1; i < trail.length; i++) {
    const alpha = (i / trail.length) * 0.5;
    ctx.strokeStyle = planet.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    const sp1 = worldToScreen(trail[i - 1].x, trail[i - 1].y);
    const sp2 = worldToScreen(trail[i].x, trail[i].y);
    ctx.beginPath();
    ctx.moveTo(sp1.x, sp1.y);
    ctx.lineTo(sp2.x, sp2.y);
    ctx.stroke();
  }
}

function drawAsteroids() {
  for (const a of asteroids) {
    const r = scaleDistance(a.distance + a.offset);
    const sp = worldToScreen(
      r * Math.cos(a.angle),
      r * Math.sin(a.angle)
    );
    if (sp.x < -5 || sp.x > W + 5 || sp.y < -5 || sp.y > H + 5) continue;
    ctx.fillStyle = `rgba(180,170,150,${a.brightness})`;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, a.size * Math.min(camera.zoom * 0.5, 1.5), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlanet(planet, index) {
  const pos = getPlanetPos(planet, time);
  const sp = worldToScreen(pos.x, pos.y);
  const screenSize = Math.max(planet.size * camera.zoom * 0.7, 5);

  if (showGlow) {
    const glowGrad = ctx.createRadialGradient(sp.x, sp.y, screenSize, sp.x, sp.y, screenSize * 3);
    glowGrad.addColorStop(0, planet.glowColor);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, screenSize * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  if (planet.ringColor) {
    const ringW = planet.ringWidth * camera.zoom * 0.4;
    ctx.save();
    ctx.translate(sp.x, sp.y);
    ctx.scale(1, 0.35);
    ctx.strokeStyle = planet.ringColor;
    ctx.lineWidth = 3 * camera.zoom * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, screenSize + ringW * 0.4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = planet.ringColor.replace('0.35', '0.2');
    ctx.lineWidth = 2 * camera.zoom * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, screenSize + ringW * 0.65, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  const pGrad = ctx.createRadialGradient(
    sp.x - screenSize * 0.3, sp.y - screenSize * 0.3, 0,
    sp.x, sp.y, screenSize
  );
  pGrad.addColorStop(0, lighten(planet.color, 40));
  pGrad.addColorStop(0.6, planet.color);
  pGrad.addColorStop(1, darken(planet.color, 40));
  ctx.fillStyle = pGrad;
  ctx.beginPath();
  ctx.arc(sp.x, sp.y, screenSize, 0, Math.PI * 2);
  ctx.fill();

  if (planet === hoveredPlanet || planet === selectedPlanet) {
    ctx.strokeStyle = planet.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, screenSize + 4, 0, Math.PI * 2);
    ctx.stroke();
  }

  if (showLabels) {
    const labelY = sp.y - screenSize - 10;
    ctx.font = '600 11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = planet === hoveredPlanet || planet === selectedPlanet
      ? 'rgba(255,255,255,0.9)'
      : 'rgba(255,255,255,0.5)';
    ctx.fillText(planet.name, sp.x, labelY);
  }

  if (showDistances) {
    const distLabel = `${planet.distance.toFixed(2)} AU`;
    ctx.font = '10px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText(distLabel, sp.x, sp.y + screenSize + 16);
  }
}

function lighten(hex, amt) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.min(255, r + amt)},${Math.min(255, g + amt)},${Math.min(255, b + amt)})`;
}

function darken(hex, amt) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.max(0, r - amt)},${Math.max(0, g - amt)},${Math.max(0, b - amt)})`;
}

function showPlanetInfo(planet) {
  const el = document.getElementById('planet-info');
  document.getElementById('info-name').textContent = planet.name;
  document.getElementById('info-subtitle').textContent = `${planet.type} · ${planet.fact}`;
  document.getElementById('info-color').style.background =
    `radial-gradient(circle at 35% 35%, ${lighten(planet.color, 60)}, ${planet.color}, ${darken(planet.color, 50)})`;

  const grid = document.getElementById('info-grid');
  grid.innerHTML = '';

  const stats = [
    { label: 'Diameter', value: planet.diameter },
    { label: 'Day Length', value: planet.dayLength },
    { label: 'Moons', value: planet.moons.toString() },
    { label: 'Gravity', value: planet.gravity },
    { label: 'Avg Temp', value: planet.temp },
    { label: 'Atmosphere', value: planet.atmosphere }
  ];

  for (const s of stats) {
    const div = document.createElement('div');
    div.className = 'info-stat';
    div.innerHTML = `
      <div class="info-stat-value">${s.value}</div>
      <div class="info-stat-label">${s.label}</div>
    `;
    grid.appendChild(div);
  }

  el.style.display = 'block';
}

function hidePlanetInfo() {
  document.getElementById('planet-info').style.display = 'none';
}

function hitTest(sx, sy) {
  for (let i = planets.length - 1; i >= 0; i--) {
    const pos = getPlanetPos(planets[i], time);
    const sp = worldToScreen(pos.x, pos.y);
    const screenSize = Math.max(planets[i].size * camera.zoom * 0.4, 3);
    const hitRadius = Math.max(screenSize, 12);
    const dx = sx - sp.x, dy = sx - sp.x;
    if (Math.hypot(sx - sp.x, sy - sp.y) < hitRadius) return planets[i];
  }
  return null;
}

let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragCameraStart = { x: 0, y: 0 };

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragCameraStart = { x: camera.x, y: camera.y };
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    camera.x = dragCameraStart.x - dx / camera.zoom;
    camera.y = dragCameraStart.y - dy / camera.zoom;
  } else {
    const hit = hitTest(e.clientX, e.clientY);
    hoveredPlanet = hit;
    canvas.style.cursor = hit ? 'pointer' : 'grab';
  }
});

canvas.addEventListener('mouseup', (e) => {
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  if (Math.hypot(dx, dy) < 5) {
    const hit = hitTest(e.clientX, e.clientY);
    if (hit) {
      selectedPlanet = hit;
      showPlanetInfo(hit);
    } else {
      selectedPlanet = null;
      hidePlanetInfo();
    }
  }
  isDragging = false;
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const worldBefore = screenToWorld(e.clientX, e.clientY);
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  camera.zoom = Math.max(0.05, Math.min(15, camera.zoom * factor));
  const worldAfter = screenToWorld(e.clientX, e.clientY);
  camera.x -= worldAfter.x - worldBefore.x;
  camera.y -= worldAfter.y - worldBefore.y;
}, { passive: false });

let touchDist = 0;
let touchCenter = { x: 0, y: 0 };

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    dragCameraStart = { x: camera.x, y: camera.y };
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    touchDist = Math.hypot(dx, dy);
    touchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    camera.x = dragCameraStart.x - dx / camera.zoom;
    camera.y = dragCameraStart.y - dy / camera.zoom;
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const newDist = Math.hypot(dx, dy);
    const factor = newDist / touchDist;
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const worldBefore = screenToWorld(cx, cy);
    camera.zoom = Math.max(0.05, Math.min(15, camera.zoom * factor));
    const worldAfter = screenToWorld(cx, cy);
    camera.x -= worldAfter.x - worldBefore.x;
    camera.y -= worldAfter.y - worldBefore.y;
    touchDist = newDist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) {
    isDragging = false;
  }
});

function setSpeed(e, s) {
  timeSpeed = s;
  document.getElementById('speed-label').textContent =
    s === 0 ? 'Paused' : `${s}× speed`;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
}

function toggle(prop) {
  switch (prop) {
    case 'orbits': showOrbits = !showOrbits; break;
    case 'labels': showLabels = !showLabels; break;
    case 'trails': showTrails = !showTrails; if (!showTrails) trails.forEach(t => t.length = 0); break;
    case 'glow': showGlow = !showGlow; break;
    case 'distances': showDistances = !showDistances; break;
    case 'asteroids': showAsteroids = !showAsteroids; break;
  }
  document.getElementById(`btn-${prop}`).classList.toggle('active');
}

let lastFrame = performance.now();

function animate(now) {
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;

  time += dt * timeSpeed * 0.05;

  for (const a of asteroids) {
    a.angle += a.speed * dt * timeSpeed * 0.05;
  }

  if (showTrails) {
    for (let i = 0; i < planets.length; i++) {
      const pos = getPlanetPos(planets[i], time);
      trails[i].push({ x: pos.x, y: pos.y });
      if (trails[i].length > maxTrailLength) trails[i].shift();
    }
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  drawStars();

  if (showOrbits) {
    for (const p of planets) drawOrbit(p);
  }

  if (showAsteroids) drawAsteroids();
  if (showTrails) {
    for (let i = 0; i < planets.length; i++) drawTrail(i);
  }

  drawSun();

  for (let i = 0; i < planets.length; i++) {
    drawPlanet(planets[i], i);
  }

  requestAnimationFrame(animate);
}

camera.zoom = Math.min(W, H) / (scaleDistance(32) * 2.2) || 0.22;

requestAnimationFrame(animate);
</script>
</body>
</html>
