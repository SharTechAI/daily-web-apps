<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topographic Map Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

h1 {
  font-size: 1.8rem;
  margin: 24px 0 4px;
  background: linear-gradient(135deg, #4ecdc4, #556270);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  color: #888;
  font-size: 0.85rem;
  margin-bottom: 16px;
}

.container {
  display: flex;
  gap: 20px;
  padding: 0 20px 40px;
  max-width: 1200px;
  width: 100%;
  flex-wrap: wrap;
  justify-content: center;
}

.canvas-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  border: 1px solid #333;
}

canvas {
  display: block;
  cursor: crosshair;
}

.controls {
  background: #16213e;
  border: 1px solid #2a2a4a;
  border-radius: 12px;
  padding: 20px;
  min-width: 260px;
  max-width: 300px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.control-group label {
  font-size: 0.78rem;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.control-group input[type="range"] {
  width: 100%;
  accent-color: #4ecdc4;
}

.control-group select {
  background: #1a1a2e;
  color: #e0e0e0;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.85rem;
}

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  background: linear-gradient(135deg, #4ecdc4, #44a08d);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  flex: 1;
}

button:hover { transform: scale(1.03); }
button:active { transform: scale(0.97); }

button.secondary {
  background: #2a2a4a;
  border: 1px solid #444;
}

.tool-selector {
  display: flex;
  gap: 6px;
}

.tool-btn {
  flex: 1;
  padding: 8px 6px;
  font-size: 0.75rem;
  border-radius: 6px;
  background: #2a2a4a;
  border: 1px solid #444;
  color: #ccc;
}

.tool-btn.active {
  background: linear-gradient(135deg, #4ecdc4, #44a08d);
  border-color: #4ecdc4;
  color: #fff;
}

.value-display {
  font-size: 0.75rem;
  color: #4ecdc4;
  float: right;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  color: #999;
}

.legend-swatch {
  width: 14px;
  height: 10px;
  border-radius: 2px;
}

.info {
  font-size: 0.72rem;
  color: #666;
  line-height: 1.4;
  padding: 8px;
  background: #111;
  border-radius: 6px;
}

@media (max-width: 700px) {
  .container { flex-direction: column; align-items: center; }
  .controls { max-width: 100%; min-width: 0; width: 100%; }
  canvas { width: 100%; height: auto; }
}
</style>
</head>
<body>

<h1>Topographic Map Generator</h1>
<p class="subtitle">Procedural terrain with contour lines — click to sculpt</p>

<div class="container">
  <div class="canvas-wrap">
    <canvas id="canvas" width="600" height="600"></canvas>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Color Palette</label>
      <select id="palette">
        <option value="earth">Earth Tones</option>
        <option value="ocean">Ocean Depths</option>
        <option value="alien">Alien Planet</option>
        <option value="desert">Desert Canyon</option>
        <option value="arctic">Arctic Ice</option>
        <option value="volcanic">Volcanic</option>
      </select>
    </div>

    <div class="control-group">
      <label>Contour Lines <span class="value-display" id="contourVal">20</span></label>
      <input type="range" id="contours" min="5" max="50" value="20">
    </div>

    <div class="control-group">
      <label>Roughness <span class="value-display" id="roughVal">0.65</span></label>
      <input type="range" id="roughness" min="30" max="90" value="65">
    </div>

    <div class="control-group">
      <label>Sea Level <span class="value-display" id="seaVal">0.30</span></label>
      <input type="range" id="seaLevel" min="0" max="60" value="30">
    </div>

    <div class="control-group">
      <label>Scale <span class="value-display" id="scaleVal">4</span></label>
      <input type="range" id="scale" min="2" max="10" value="4">
    </div>

    <div class="control-group">
      <label>Editing Tool</label>
      <div class="tool-selector">
        <button class="tool-btn active" data-tool="raise">⬆ Raise</button>
        <button class="tool-btn" data-tool="lower">⬇ Lower</button>
        <button class="tool-btn" data-tool="smooth">〰 Smooth</button>
      </div>
    </div>

    <div class="control-group">
      <label>Brush Size <span class="value-display" id="brushVal">40</span></label>
      <input type="range" id="brushSize" min="10" max="100" value="40">
    </div>

    <div class="btn-row">
      <button id="generateBtn">🗺️ Generate</button>
      <button id="exportBtn" class="secondary">💾 Export</button>
    </div>

    <div class="control-group">
      <label>Elevation Legend</label>
      <div class="legend" id="legend"></div>
    </div>

    <div class="info">
      Click and drag on the map to sculpt terrain. Use Raise/Lower to create mountains and valleys, or Smooth to blend areas. Generate creates a new random map.
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let heightmap = new Float32Array(W * H);
let tool = 'raise';
let isDrawing = false;

const palettes = {
  earth: [
    [0, '#1a5276'], [0.15, '#2e86c1'], [0.3, '#85c1e9'],
    [0.35, '#f9e79f'], [0.45, '#7dcea0'], [0.6, '#27ae60'],
    [0.75, '#6e4b3a'], [0.88, '#8b7355'], [1, '#f5f5f5']
  ],
  ocean: [
    [0, '#0c1445'], [0.2, '#1a237e'], [0.35, '#1565c0'],
    [0.5, '#42a5f5'], [0.6, '#80deea'], [0.7, '#b2ebf2'],
    [0.8, '#e0f7fa'], [0.9, '#fff9c4'], [1, '#ffffff']
  ],
  alien: [
    [0, '#1b0033'], [0.15, '#4a0072'], [0.3, '#7b1fa2'],
    [0.4, '#e040fb'], [0.55, '#ff6d00'], [0.7, '#ffab00'],
    [0.85, '#c6ff00'], [0.95, '#69f0ae'], [1, '#ffffff']
  ],
  desert: [
    [0, '#1a0f00'], [0.15, '#4e342e'], [0.3, '#8d6e63'],
    [0.45, '#d7a86e'], [0.6, '#f4c97e'], [0.75, '#fff3e0'],
    [0.85, '#e65100'], [0.93, '#bf360c'], [1, '#ffccbc']
  ],
  arctic: [
    [0, '#0d1b2a'], [0.2, '#1b3a5c'], [0.35, '#415a77'],
    [0.45, '#778da9'], [0.55, '#a8c4d6'], [0.7, '#d3e8f0'],
    [0.8, '#e8f4f8'], [0.9, '#f0f8ff'], [1, '#ffffff']
  ],
  volcanic: [
    [0, '#0a0a0a'], [0.15, '#1a0000'], [0.3, '#4a0000'],
    [0.4, '#8b0000'], [0.55, '#ff4500'], [0.65, '#ff8c00'],
    [0.75, '#ffd700'], [0.85, '#333333'], [0.93, '#666666'], [1, '#999999']
  ]
};

function noise(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function perlin2D(x, y, freq, octaves, persistence, rng) {
  const permutation = new Uint8Array(512);
  for (let i = 0; i < 256; i++) permutation[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [permutation[i], permutation[j]] = [permutation[j], permutation[i]];
  }
  for (let i = 0; i < 256; i++) permutation[i + 256] = permutation[i];

  function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function lerp(a, b, t) { return a + t * (b - a); }
  function grad(hash, x, y) {
    const h = hash & 7;
    const u = h < 4 ? x : y;
    const v = h < 4 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }

  function perlinAt(px, py) {
    const X = Math.floor(px) & 255;
    const Y = Math.floor(py) & 255;
    const xf = px - Math.floor(px);
    const yf = py - Math.floor(py);
    const u = fade(xf);
    const v = fade(yf);
    const A = permutation[X] + Y;
    const B = permutation[X + 1] + Y;
    return lerp(
      lerp(grad(permutation[A], xf, yf), grad(permutation[B], xf - 1, yf), u),
      lerp(grad(permutation[A + 1], xf, yf - 1), grad(permutation[B + 1], xf - 1, yf - 1), u),
      v
    );
  }

  let val = 0, amp = 1, maxAmp = 0;
  for (let o = 0; o < octaves; o++) {
    val += perlinAt(x * freq, y * freq) * amp;
    maxAmp += amp;
    amp *= persistence;
    freq *= 2;
  }
  return (val / maxAmp + 1) * 0.5;
}

function generateHeightmap() {
  const scale = parseFloat(document.getElementById('scale').value);
  const roughness = parseInt(document.getElementById('roughness').value) / 100;
  const seed = Math.floor(Math.random() * 100000);
  const rng = noise(seed);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const nx = x / W * scale;
      const ny = y / H * scale;
      let h = perlin2D(nx, ny, 1, 6, roughness, noise(seed));

      const dx = (x / W - 0.5) * 2;
      const dy = (y / H - 0.5) * 2;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const falloff = Math.max(0, 1 - dist * 0.8);
      h *= falloff;

      heightmap[y * W + x] = h;
    }
  }
  render();
}

function getColor(value, palette) {
  const stops = palettes[palette];
  for (let i = 1; i < stops.length; i++) {
    if (value <= stops[i][0]) {
      const t = (value - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
      const c1 = hexToRgb(stops[i-1][1]);
      const c2 = hexToRgb(stops[i][1]);
      return [
        Math.round(c1[0] + (c2[0] - c1[0]) * t),
        Math.round(c1[1] + (c2[1] - c1[1]) * t),
        Math.round(c1[2] + (c2[2] - c1[2]) * t)
      ];
    }
  }
  return hexToRgb(stops[stops.length - 1][1]);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

function render() {
  const palette = document.getElementById('palette').value;
  const numContours = parseInt(document.getElementById('contours').value);
  const seaLevel = parseInt(document.getElementById('seaLevel').value) / 100;
  const imageData = ctx.createImageData(W, H);
  const data = imageData.data;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      let h = heightmap[i];
      const [r, g, b] = getColor(h, palette);
      const pi = i * 4;
      data[pi] = r;
      data[pi + 1] = g;
      data[pi + 2] = b;
      data[pi + 3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);

  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 0.8;

  for (let c = 0; c <= numContours; c++) {
    const level = c / numContours;
    if (level < seaLevel) continue;
    drawContourLine(level);
  }

  ctx.strokeStyle = 'rgba(30,80,180,0.5)';
  ctx.lineWidth = 1.2;
  if (seaLevel > 0.01) {
    drawContourLine(seaLevel);
  }

  updateLegend();
}

function drawContourLine(level) {
  const step = 3;
  ctx.beginPath();
  let hasPoints = false;

  for (let y = 0; y < H - step; y += step) {
    for (let x = 0; x < W - step; x += step) {
      const tl = heightmap[y * W + x];
      const tr = heightmap[y * W + x + step];
      const bl = heightmap[(y + step) * W + x];
      const br = heightmap[(y + step) * W + x + step];

      const segments = marchingSquare(x, y, step, tl, tr, bl, br, level);
      for (const seg of segments) {
        ctx.moveTo(seg[0], seg[1]);
        ctx.lineTo(seg[2], seg[3]);
        hasPoints = true;
      }
    }
  }

  if (hasPoints) ctx.stroke();
}

function marchingSquare(x, y, step, tl, tr, bl, br, level) {
  let config = 0;
  if (tl >= level) config |= 8;
  if (tr >= level) config |= 4;
  if (br >= level) config |= 2;
  if (bl >= level) config |= 1;

  if (config === 0 || config === 15) return [];

  const segments = [];
  const t = (v1, v2) => (level - v1) / (v2 - v1);

  const top = [x + t(tl, tr) * step, y];
  const right = [x + step, y + t(tr, br) * step];
  const bottom = [x + t(bl, br) * step, y + step];
  const left = [x, y + t(tl, bl) * step];

  switch (config) {
    case 1: case 14: segments.push([left[0], left[1], bottom[0], bottom[1]]); break;
    case 2: case 13: segments.push([bottom[0], bottom[1], right[0], right[1]]); break;
    case 3: case 12: segments.push([left[0], left[1], right[0], right[1]]); break;
    case 4: case 11: segments.push([top[0], top[1], right[0], right[1]]); break;
    case 5:
      segments.push([left[0], left[1], top[0], top[1]]);
      segments.push([bottom[0], bottom[1], right[0], right[1]]);
      break;
    case 6: case 9: segments.push([top[0], top[1], bottom[0], bottom[1]]); break;
    case 7: case 8: segments.push([left[0], left[1], top[0], top[1]]); break;
    case 10:
      segments.push([top[0], top[1], right[0], right[1]]);
      segments.push([left[0], left[1], bottom[0], bottom[1]]);
      break;
  }
  return segments;
}

function applyBrush(cx, cy) {
  const size = parseInt(document.getElementById('brushSize').value);
  const strength = 0.03;

  for (let dy = -size; dy <= size; dy++) {
    for (let dx = -size; dx <= size; dx++) {
      const px = cx + dx;
      const py = cy + dy;
      if (px < 0 || px >= W || py < 0 || py >= H) continue;

      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > size) continue;

      const falloff = 1 - (dist / size);
      const i = py * W + px;

      if (tool === 'raise') {
        heightmap[i] = Math.min(1, heightmap[i] + strength * falloff);
      } else if (tool === 'lower') {
        heightmap[i] = Math.max(0, heightmap[i] - strength * falloff);
      } else if (tool === 'smooth') {
        let sum = 0, count = 0;
        for (let sy = -3; sy <= 3; sy++) {
          for (let sx = -3; sx <= 3; sx++) {
            const nx = px + sx, ny = py + sy;
            if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
              sum += heightmap[ny * W + nx];
              count++;
            }
          }
        }
        heightmap[i] += (sum / count - heightmap[i]) * falloff * 0.5;
      }
    }
  }
}

function updateLegend() {
  const palette = document.getElementById('palette').value;
  const stops = palettes[palette];
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const labels = ['Deep', 'Low', 'Mid', 'High', 'Peak'];
  const indices = [0, 2, 4, 6, stops.length - 1];
  indices.forEach((idx, i) => {
    if (idx < stops.length) {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:${stops[idx][1]}"></div>${labels[i]}`;
      legend.appendChild(item);
    }
  });
}

canvas.addEventListener('mousedown', (e) => {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX);
  const y = Math.floor((e.clientY - rect.top) * scaleY);
  applyBrush(x, y);
  render();
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX);
  const y = Math.floor((e.clientY - rect.top) * scaleY);
  applyBrush(x, y);
  render();
});

canvas.addEventListener('mouseup', () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  isDrawing = true;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = Math.floor((touch.clientX - rect.left) * scaleX);
  const y = Math.floor((touch.clientY - rect.top) * scaleY);
  applyBrush(x, y);
  render();
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDrawing) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = Math.floor((touch.clientX - rect.left) * scaleX);
  const y = Math.floor((touch.clientY - rect.top) * scaleY);
  applyBrush(x, y);
  render();
});

canvas.addEventListener('touchend', () => { isDrawing = false; });

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
  });
});

document.getElementById('contours').addEventListener('input', (e) => {
  document.getElementById('contourVal').textContent = e.target.value;
  render();
});

document.getElementById('roughness').addEventListener('input', (e) => {
  document.getElementById('roughVal').textContent = (e.target.value / 100).toFixed(2);
});

document.getElementById('seaLevel').addEventListener('input', (e) => {
  document.getElementById('seaVal').textContent = (e.target.value / 100).toFixed(2);
  render();
});

document.getElementById('scale').addEventListener('input', (e) => {
  document.getElementById('scaleVal').textContent = e.target.value;
});

document.getElementById('brushSize').addEventListener('input', (e) => {
  document.getElementById('brushVal').textContent = e.target.value;
});

document.getElementById('palette').addEventListener('change', () => { render(); });

document.getElementById('generateBtn').addEventListener('click', generateHeightmap);

document.getElementById('exportBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'topographic-map.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

generateHeightmap();
</script>
</body>
</html>
