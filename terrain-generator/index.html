<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Terrain Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    color: #e0e0f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
  }

  .sidebar {
    width: 300px;
    min-width: 300px;
    background: #12121c;
    border-right: 1px solid #2a2a3a;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
  }

  .sidebar h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar h1 span { font-size: 1.5rem; }

  .section {
    background: #1a1a28;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 14px;
  }

  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7a7a9a;
    margin-bottom: 12px;
  }

  .control {
    margin-bottom: 10px;
  }

  .control:last-child { margin-bottom: 0; }

  .control label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: #b0b0cc;
    margin-bottom: 4px;
  }

  .control label .val {
    color: #7c6ff7;
    font-weight: 600;
    font-size: 0.75rem;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #2a2a3a;
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #7c6ff7;
    border-radius: 50%;
    cursor: pointer;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 80px;
    padding: 8px 12px;
    background: #7c6ff7;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover { background: #6b5ce6; }

  .btn.secondary {
    background: #2a2a3a;
    color: #b0b0cc;
  }

  .btn.secondary:hover { background: #3a3a4a; }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .preset-btn {
    padding: 6px 8px;
    background: #22223a;
    border: 1px solid #2a2a3a;
    color: #b0b0cc;
    border-radius: 6px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .preset-btn:hover {
    border-color: #7c6ff7;
    color: #e0e0f0;
  }

  .preset-btn.active {
    border-color: #7c6ff7;
    background: rgba(124,111,247,0.15);
    color: #7c6ff7;
  }

  .view-btns {
    display: flex;
    gap: 4px;
  }

  .view-btn {
    flex: 1;
    padding: 6px;
    background: #22223a;
    border: 1px solid #2a2a3a;
    color: #b0b0cc;
    border-radius: 6px;
    font-size: 0.72rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .view-btn:hover { border-color: #7c6ff7; color: #e0e0f0; }
  .view-btn.active { border-color: #7c6ff7; background: rgba(124,111,247,0.15); color: #7c6ff7; }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

    display: block;
    width: 100%;
    height: 100%;
  }

  .info-bar {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(18,18,28,0.85);
    border: 1px solid #2a2a3a;

    color: #7a7a9a;

    font-size: 0.8rem;

  select {

    background: #22223a;

    color: #e0e0f0;

    font-size: 0.8rem;
    outline: none;
    cursor: pointer;

  @media (max-width: 700px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: unset;
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid #2a2a3a;
    }
  }
</style>

<body>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="info-bar">
    Grid: <span id="info-grid">128×128</span> &nbsp;|&nbsp;
    Seed: <span id="info-seed">42</span> &nbsp;|&nbsp;
    FPS: <span id="info-fps">--</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const GRID = 128;

let params = {
  scale: 60,
  octaves: 6,
  persistence: 0.5,
  lacunarity: 2.0,
  heightScale: 100,
  seaLevel: 0.35,
  rotation: 35,
  tilt: 55,
  zoom: 1.0,
  seed: 42,
  colorScheme: 'natural',
  viewMode: '3d',
  animating: false
};

let heightMap = new Float32Array(GRID * GRID);
let needsRegen = true;
let animFrame = 0;

// Simplex-like noise via improved Perlin hash
class PerlinNoise {
  constructor(seed) {
    this.perm = new Uint8Array(512);
    const p = new Uint8Array(256);
    let s = seed | 0;
    for (let i = 0; i < 256; i++) {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      p[i] = i;
    }
    for (let i = 255; i > 0; i--) {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      const j = s % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
  }

  fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }

  lerp(a, b, t) { return a + t * (b - a); }

  grad(hash, x, y) {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }

  noise(x, y) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const u = this.fade(xf);
    const v = this.fade(yf);
    const p = this.perm;
    const aa = p[p[X] + Y];
    const ab = p[p[X] + Y + 1];
    const ba = p[p[X + 1] + Y];
    const bb = p[p[X + 1] + Y + 1];
    return this.lerp(
      this.lerp(this.grad(aa, xf, yf), this.grad(ba, xf - 1, yf), u),
      this.lerp(this.grad(ab, xf, yf - 1), this.grad(bb, xf - 1, yf - 1), u),
      v
    );
  }

  fbm(x, y, octaves, persistence, lacunarity) {
    let val = 0, amp = 1, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) {
      val += this.noise(x * freq, y * freq) * amp;
      max += amp;
      amp *= persistence;
      freq *= lacunarity;
    }
    return val / max;
  }
}

function generateHeightMap() {
  const noise = new PerlinNoise(params.seed);
  const s = params.scale;
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      let nx = x / s, ny = y / s;
      let h = noise.fbm(nx, ny, params.octaves, params.persistence, params.lacunarity);
      h = (h + 1) * 0.5;

      const dx = (x - GRID / 2) / (GRID / 2);
      const dy = (y - GRID / 2) / (GRID / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      const falloff = Math.max(0, 1 - dist * dist * 1.2);
      h *= falloff;

      heightMap[y * GRID + x] = Math.max(0, Math.min(1, h));
    }
  }
}

const COLOR_SCHEMES = {
  natural: [
    [0.00, [15, 30, 80]],
    [0.15, [25, 60, 130]],
    [0.30, [50, 110, 180]],
    [0.35, [210, 200, 160]],
    [0.40, [160, 190, 80]],
    [0.55, [80, 150, 50]],
    [0.65, [50, 110, 35]],
    [0.75, [100, 90, 70]],
    [0.85, [140, 130, 120]],
    [0.95, [220, 220, 230]],
    [1.00, [255, 255, 255]]
  ],
  desert: [
    [0.00, [20, 40, 60]],
    [0.15, [40, 70, 100]],
    [0.30, [60, 100, 130]],
    [0.35, [220, 200, 150]],
    [0.45, [210, 180, 120]],
    [0.55, [190, 150, 90]],
    [0.65, [170, 120, 70]],
    [0.75, [150, 100, 60]],
    [0.85, [130, 80, 50]],
    [0.95, [200, 170, 140]],
    [1.00, [240, 220, 200]]
  ],
  arctic: [
    [0.00, [10, 20, 50]],
    [0.15, [20, 40, 80]],
    [0.30, [40, 80, 120]],
    [0.35, [180, 200, 220]],
    [0.40, [200, 215, 230]],
    [0.55, [210, 225, 240]],
    [0.65, [220, 235, 245]],
    [0.75, [230, 240, 248]],
    [0.85, [240, 245, 250]],
    [0.95, [248, 250, 255]],
    [1.00, [255, 255, 255]]
  ],
  volcanic: [
    [0.00, [5, 5, 20]],
    [0.15, [15, 10, 30]],
    [0.30, [30, 20, 40]],
    [0.35, [50, 30, 30]],
    [0.45, [80, 40, 20]],
    [0.55, [120, 50, 15]],
    [0.65, [180, 60, 10]],
    [0.75, [220, 100, 20]],
    [0.85, [250, 160, 40]],
    [0.95, [255, 220, 100]],
    [1.00, [255, 255, 200]]
  ],
  fantasy: [
    [0.00, [20, 10, 50]],
    [0.15, [40, 20, 90]],
    [0.30, [60, 40, 130]],
    [0.35, [120, 60, 160]],
    [0.45, [80, 170, 120]],
    [0.55, [60, 200, 150]],
    [0.65, [100, 80, 180]],
    [0.75, [160, 100, 200]],
    [0.85, [200, 140, 220]],
    [0.95, [240, 200, 250]],
    [1.00, [255, 230, 255]]
  ],
  ocean: [
    [0.00, [5, 5, 30]],
    [0.15, [10, 15, 60]],
    [0.30, [15, 30, 100]],
    [0.35, [30, 60, 140]],
    [0.45, [50, 100, 170]],
    [0.55, [70, 140, 190]],
    [0.65, [100, 170, 200]],
    [0.75, [140, 200, 210]],
    [0.85, [180, 220, 225]],
    [0.95, [220, 240, 242]],
    [1.00, [245, 250, 252]]
  ],
  autumn: [
    [0.00, [10, 20, 40]],
    [0.15, [20, 40, 70]],
    [0.30, [40, 70, 110]],
    [0.35, [180, 160, 100]],
    [0.40, [180, 140, 50]],
    [0.50, [200, 120, 30]],
    [0.60, [190, 80, 20]],
    [0.70, [160, 50, 20]],
    [0.80, [120, 40, 30]],
    [0.90, [140, 100, 80]],
    [1.00, [220, 210, 200]]
  ],
  neon: [
    [0.00, [0, 5, 15]],
    [0.15, [0, 10, 40]],
    [0.30, [0, 30, 80]],
    [0.35, [0, 255, 200]],
    [0.45, [0, 200, 255]],
    [0.55, [100, 0, 255]],
    [0.65, [200, 0, 255]],
    [0.75, [255, 0, 200]],
    [0.85, [255, 0, 100]],
    [0.95, [255, 100, 0]],
    [1.00, [255, 255, 0]]
  ]
};

function getColor(h) {
  const scheme = COLOR_SCHEMES[params.colorScheme] || COLOR_SCHEMES.natural;
  const sl = params.seaLevel;
  const adjusted = h <= sl ? (h / sl) * scheme[3][0] : h;

  for (let i = 0; i < scheme.length - 1; i++) {
    if (adjusted >= scheme[i][0] && adjusted <= scheme[i + 1][0]) {
      const t = (adjusted - scheme[i][0]) / (scheme[i + 1][0] - scheme[i][0]);
      const c1 = scheme[i][1], c2 = scheme[i + 1][1];
      return [
        c1[0] + (c2[0] - c1[0]) * t,
        c1[1] + (c2[1] - c1[1]) * t,
        c1[2] + (c2[2] - c1[2]) * t
      ];
    }
  }
  return scheme[scheme.length - 1][1];
}

function resize() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
}

function render3D() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, w, h);

  const rot = params.rotation * Math.PI / 180;
  const tilt = params.tilt * Math.PI / 180;
  const zoom = params.zoom;
  const hScale = params.heightScale;
  const sl = params.seaLevel;
  const cosR = Math.cos(rot), sinR = Math.sin(rot);
  const cosT = Math.cos(tilt), sinT = Math.sin(tilt);
  const cx = w / 2, cy = h / 2;
  const cellSize = Math.min(w, h) / GRID * zoom * 0.9;

  function project(gx, gy, gz) {
    const x3 = (gx - GRID / 2) * cellSize;
    const y3 = (gy - GRID / 2) * cellSize;
    const z3 = gz * hScale * cellSize * 0.01;
    const rx = x3 * cosR - y3 * sinR;
    const ry = x3 * sinR + y3 * cosR;
    return [
      cx + rx,
      cy + ry * cosT - z3 * sinT
    ];
  }

  const faces = [];
  for (let y = 0; y < GRID - 1; y++) {
    for (let x = 0; x < GRID - 1; x++) {
      const h00 = heightMap[y * GRID + x];
      const h10 = heightMap[y * GRID + x + 1];
      const h01 = heightMap[(y + 1) * GRID + x];
      const h11 = heightMap[(y + 1) * GRID + x + 1];
      const avgH = (h00 + h10 + h01 + h11) / 4;
      const drawH00 = Math.max(h00, sl);
      const drawH10 = Math.max(h10, sl);
      const drawH01 = Math.max(h01, sl);
      const drawH11 = Math.max(h11, sl);
      const p0 = project(x, y, drawH00);
      const p1 = project(x + 1, y, drawH10);
      const p2 = project(x + 1, y + 1, drawH11);
      const p3 = project(x, y + 1, drawH01);
      const depth = (p0[1] + p1[1] + p2[1] + p3[1]) / 4;
      const color = getColor(avgH);
      const nx = (h10 - h00 + h11 - h01) * 0.5;
      const ny = (h01 - h00 + h11 - h10) * 0.5;
      const light = Math.max(0.3, Math.min(1, 0.6 + nx * 2 - ny * 1.5));
      faces.push({ p0, p1, p2, p3, depth, color, light, isWater: avgH <= sl });
    }
  }

  faces.sort((a, b) => a.depth - b.depth);

  for (const f of faces) {
    const c = f.color;
    const l = f.light;
    let r = Math.round(c[0] * l);
    let g = Math.round(c[1] * l);
    let b = Math.round(c[2] * l);

    if (f.isWater) {
      const wave = Math.sin((f.p0[0] + f.p0[1]) * 0.02 + animFrame * 0.05) * 0.1 + 0.9;
      r = Math.round(r * wave);
      g = Math.round(g * wave);
      b = Math.round(b * wave);
    }

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.moveTo(f.p0[0], f.p0[1]);
    ctx.lineTo(f.p1[0], f.p1[1]);
    ctx.lineTo(f.p2[0], f.p2[1]);
    ctx.lineTo(f.p3[0], f.p3[1]);
    ctx.closePath();
    ctx.fill();
  }
}

function renderTopDown() {
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.createImageData(w, h);
  const data = imgData.data;
  const sl = params.seaLevel;

  for (let py = 0; py < h; py++) {
    for (let px = 0; px < w; px++) {
      const gx = (px / w) * GRID;
      const gy = (py / h) * GRID;
      const ix = Math.min(GRID - 1, Math.floor(gx));
      const iy = Math.min(GRID - 1, Math.floor(gy));
      const hv = heightMap[iy * GRID + ix];
      const color = getColor(hv);

      let light = 1;
      if (ix > 0 && iy > 0) {
        const dx = heightMap[iy * GRID + ix] - heightMap[iy * GRID + ix - 1];
        const dy = heightMap[iy * GRID + ix] - heightMap[(iy - 1) * GRID + ix];
        light = Math.max(0.4, Math.min(1.2, 0.7 + dx * 8 - dy * 6));
      }

      const i = (py * w + px) * 4;
      data[i] = Math.min(255, Math.round(color[0] * light));
      data[i + 1] = Math.min(255, Math.round(color[1] * light));
      data[i + 2] = Math.min(255, Math.round(color[2] * light));
      data[i + 3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function renderHeightmap() {
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.createImageData(w, h);
  const data = imgData.data;

  for (let py = 0; py < h; py++) {
    for (let px = 0; px < w; px++) {
      const ix = Math.min(GRID - 1, Math.floor((px / w) * GRID));
      const iy = Math.min(GRID - 1, Math.floor((py / h) * GRID));
      const v = Math.round(heightMap[iy * GRID + ix] * 255);
      const i = (py * w + px) * 4;
      data[i] = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function renderWireframe() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, w, h);

  const rot = params.rotation * Math.PI / 180;
  const tilt = params.tilt * Math.PI / 180;
  const zoom = params.zoom;
  const hScale = params.heightScale;
  const sl = params.seaLevel;
  const cosR = Math.cos(rot), sinR = Math.sin(rot);
  const cosT = Math.cos(tilt), sinT = Math.sin(tilt);
  const cx = w / 2, cy = h / 2;
  const cellSize = Math.min(w, h) / GRID * zoom * 0.9;
  const step = 2;

  function project(gx, gy, gz) {
    const x3 = (gx - GRID / 2) * cellSize;
    const y3 = (gy - GRID / 2) * cellSize;
    const z3 = gz * hScale * cellSize * 0.01;
    const rx = x3 * cosR - y3 * sinR;
    const ry = x3 * sinR + y3 * cosR;
    return [cx + rx, cy + ry * cosT - z3 * sinT];
  }

  ctx.strokeStyle = 'rgba(124, 111, 247, 0.4)';
  ctx.lineWidth = devicePixelRatio * 0.5;

  for (let y = 0; y < GRID; y += step) {
    ctx.beginPath();
    for (let x = 0; x < GRID; x += step) {
      const h = Math.max(heightMap[y * GRID + x], sl);
      const p = project(x, y, h);
      if (x === 0) ctx.moveTo(p[0], p[1]);
      else ctx.lineTo(p[0], p[1]);
    }
    ctx.stroke();
  }

  for (let x = 0; x < GRID; x += step) {
    ctx.beginPath();
    for (let y = 0; y < GRID; y += step) {
      const h = Math.max(heightMap[y * GRID + x], sl);
      const p = project(x, y, h);
      if (y === 0) ctx.moveTo(p[0], p[1]);
      else ctx.lineTo(p[0], p[1]);
    }
    ctx.stroke();
  }
}

function render() {
  if (needsRegen) {
    generateHeightMap();
    needsRegen = false;
  }

  switch (params.viewMode) {
    case '3d': render3D(); break;
    case 'topdown': renderTopDown(); break;
    case 'heightmap': renderHeightmap(); break;
    case 'wireframe': renderWireframe(); break;
  }
}

const PRESETS = {
  islands: { scale: 60, octaves: 6, persistence: 0.5, lacunarity: 2.0, heightScale: 100, seaLevel: 0.35 },
  mountains: { scale: 40, octaves: 8, persistence: 0.55, lacunarity: 2.2, heightScale: 200, seaLevel: 0.20 },
  archipelago: { scale: 30, octaves: 5, persistence: 0.45, lacunarity: 2.5, heightScale: 80, seaLevel: 0.50 },
  plains: { scale: 100, octaves: 4, persistence: 0.35, lacunarity: 2.0, heightScale: 50, seaLevel: 0.25 },
  canyon: { scale: 35, octaves: 7, persistence: 0.60, lacunarity: 2.3, heightScale: 250, seaLevel: 0.15 },
  alien: { scale: 25, octaves: 9, persistence: 0.65, lacunarity: 3.0, heightScale: 180, seaLevel: 0.30 },
  tundra: { scale: 80, octaves: 5, persistence: 0.40, lacunarity: 2.0, heightScale: 60, seaLevel: 0.20 },
  desert: { scale: 50, octaves: 4, persistence: 0.50, lacunarity: 2.8, heightScale: 120, seaLevel: 0.10 }
};

const PRESET_SCHEMES = {
  tundra: 'arctic',
  desert: 'desert',
  alien: 'fantasy',
  canyon: 'volcanic'
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  document.getElementById('scale').value = p.scale;
  document.getElementById('octaves').value = p.octaves;
  document.getElementById('persistence').value = Math.round(p.persistence * 100);
  document.getElementById('lacunarity').value = Math.round(p.lacunarity * 100);
  document.getElementById('heightScale').value = p.heightScale;
  document.getElementById('seaLevel').value = Math.round(p.seaLevel * 100);
  params.scale = p.scale;
  params.octaves = p.octaves;
  params.persistence = p.persistence;
  params.lacunarity = p.lacunarity;
  params.heightScale = p.heightScale;
  params.seaLevel = p.seaLevel;

  if (PRESET_SCHEMES[name]) {
    params.colorScheme = PRESET_SCHEMES[name];
    document.getElementById('colorScheme').value = PRESET_SCHEMES[name];
  } else {
    params.colorScheme = 'natural';
    document.getElementById('colorScheme').value = 'natural';
  }

  updateLabels();
  needsRegen = true;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-preset="${name}"]`).classList.add('active');
}

function updateLabels() {
  document.getElementById('v-scale').textContent = params.scale;
  document.getElementById('v-octaves').textContent = params.octaves;
  document.getElementById('v-persistence').textContent = params.persistence.toFixed(2);
  document.getElementById('v-lacunarity').textContent = params.lacunarity.toFixed(2);
  document.getElementById('v-heightScale').textContent = params.heightScale;
  document.getElementById('v-seaLevel').textContent = params.seaLevel.toFixed(2);
  document.getElementById('v-rotation').textContent = params.rotation;
  document.getElementById('v-tilt').textContent = params.tilt;
  document.getElementById('v-zoom').textContent = params.zoom.toFixed(1);
  document.getElementById('info-seed').textContent = params.seed;
}

['scale', 'octaves', 'persistence', 'lacunarity', 'heightScale', 'seaLevel'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    const v = parseInt(e.target.value);
    if (id === 'persistence') params.persistence = v / 100;
    else if (id === 'lacunarity') params.lacunarity = v / 100;
    else if (id === 'seaLevel') params.seaLevel = v / 100;
    else params[id] = v;
    updateLabels();
    needsRegen = true;
  });
});

['rotation', 'tilt'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    params[id] = parseInt(e.target.value);
    updateLabels();
  });
});

document.getElementById('zoom').addEventListener('input', e => {
  params.zoom = parseInt(e.target.value) / 100;
  updateLabels();
});

document.getElementById('colorScheme').addEventListener('change', e => {
  params.colorScheme = e.target.value;
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    params.viewMode = btn.dataset.view;
  });
});

document.getElementById('regenerate').addEventListener('click', () => {
  const seedVal = document.getElementById('seed').value;
  params.seed = hashSeed(seedVal);
  needsRegen = true;
  updateLabels();
});

document.getElementById('randomSeed').addEventListener('click', () => {
  const rs = Math.floor(Math.random() * 999999);
  document.getElementById('seed').value = rs;
  params.seed = rs;
  needsRegen = true;
  updateLabels();
});

document.getElementById('seed').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    params.seed = hashSeed(e.target.value);
    needsRegen = true;
    updateLabels();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `terrain-${params.seed}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

let isAnimating = false;
document.getElementById('animateBtn').addEventListener('click', () => {
  isAnimating = !isAnimating;
  document.getElementById('animateBtn').textContent = isAnimating ? 'Stop' : 'Animate';
});

function hashSeed(str) {
  str = String(str);
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

let isDragging = false;
let lastMouse = [0, 0];

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  lastMouse = [e.clientX, e.clientY];
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse[0];
  const dy = e.clientY - lastMouse[1];
  lastMouse = [e.clientX, e.clientY];

  if (params.viewMode === '3d' || params.viewMode === 'wireframe') {
    params.rotation = (params.rotation + dx * 0.5 + 360) % 360;
    params.tilt = Math.max(10, Math.min(85, params.tilt - dy * 0.3));
    document.getElementById('rotation').value = Math.round(params.rotation);
    document.getElementById('tilt').value = Math.round(params.tilt);
    updateLabels();
  }
});

window.addEventListener('mouseup', () => { isDragging = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  params.zoom = Math.max(0.3, Math.min(2.0, params.zoom - e.deltaY * 0.001));
  document.getElementById('zoom').value = Math.round(params.zoom * 100);
  updateLabels();
}, { passive: false });

let lastTime = performance.now();
let frameCount = 0;
let fps = 0;

function loop(t) {
  frameCount++;
  if (t - lastTime > 1000) {
    fps = Math.round(frameCount * 1000 / (t - lastTime));
    document.getElementById('info-fps').textContent = fps;
    frameCount = 0;
    lastTime = t;
  }

  if (isAnimating) {
    params.rotation = (params.rotation + 0.2) % 360;
    document.getElementById('rotation').value = Math.round(params.rotation);
    updateLabels();
    animFrame++;
  }

  render();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); });

resize();
needsRegen = true;
requestAnimationFrame(loop);
</script>
