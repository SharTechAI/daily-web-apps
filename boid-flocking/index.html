<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boid Flocking Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    color: #e0e0f0;
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  #controls {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(12, 12, 20, 0.92);
    border: 1px solid rgba(120, 100, 255, 0.2);
    border-radius: 14px;
    padding: 18px 20px;
    width: 280px;
    backdrop-filter: blur(12px);
    z-index: 10;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  #controls.collapsed {
    transform: translateX(-310px);
    opacity: 0;
    pointer-events: none;
  }

  #toggle-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 11;
    background: rgba(12, 12, 20, 0.92);
    border: 1px solid rgba(120, 100, 255, 0.3);
    border-radius: 10px;
    color: #c0b8ff;
    font-size: 1.2rem;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
  }

  #toggle-btn.visible { display: flex; }

  h2 {
    font-size: 1rem;
    font-weight: 700;
    color: #c0b8ff;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  h2 .emoji { font-size: 1.3rem; }

  .section {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(120, 100, 255, 0.1);
  }

  .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7a78a0;
    margin-bottom: 10px;
  }

  .slider-group {
    margin-bottom: 8px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: #a0a0c0;
    margin-bottom: 3px;
  }

  .slider-label .val {
    color: #c0b8ff;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(120, 100, 255, 0.15);
    border-radius: 4px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #8070ff;
    cursor: pointer;
    border: 2px solid #0a0a12;
  }

  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 60px;
    padding: 7px 10px;
    border: 1px solid rgba(120, 100, 255, 0.25);
    border-radius: 8px;
    background: rgba(120, 100, 255, 0.08);
    color: #c0b8ff;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn:hover { background: rgba(120, 100, 255, 0.2); border-color: rgba(120, 100, 255, 0.5); }
  .btn.active { background: rgba(120, 100, 255, 0.35); border-color: #8070ff; color: #fff; }

  .preset-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #8080a0;
    margin-bottom: 3px;
  }

  .stat-row .val { color: #b0b0d0; font-weight: 600; }

  .close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: none;
    color: #6060a0;
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
  }

  .close-btn:hover { color: #a0a0e0; }

  #info-overlay {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(12, 12, 20, 0.85);
    border: 1px solid rgba(120, 100, 255, 0.15);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.75rem;
    color: #8888b0;
    backdrop-filter: blur(8px);
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
    transition: opacity 1s;
  }

  kbd {
    background: rgba(120, 100, 255, 0.15);
    border: 1px solid rgba(120, 100, 255, 0.25);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.72rem;
    font-family: inherit;
    color: #c0b8ff;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(120, 100, 255, 0.2); border-radius: 4px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<button id="toggle-btn" title="Show controls">☰</button>

<div id="controls">
  <button class="close-btn" id="close-controls" title="Hide controls">✕</button>
  <h2><span class="emoji">🐦</span> Boid Flocking</h2>

  <div class="section">
    <div class="section-title">Flock Rules</div>
    <div class="slider-group">
      <div class="slider-label"><span>Cohesion</span><span class="val" id="v-cohesion">1.0</span></div>
      <input type="range" id="cohesion" min="0" max="3" step="0.1" value="1.0">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Alignment</span><span class="val" id="v-alignment">1.0</span></div>
      <input type="range" id="alignment" min="0" max="3" step="0.1" value="1.0">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Separation</span><span class="val" id="v-separation">1.2</span></div>
      <input type="range" id="separation" min="0" max="3" step="0.1" value="1.2">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Perception</span><span class="val" id="v-perception">80</span></div>
      <input type="range" id="perception" min="20" max="200" step="5" value="80">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Max Speed</span><span class="val" id="v-maxSpeed">4.0</span></div>
      <input type="range" id="maxSpeed" min="1" max="10" step="0.5" value="4.0">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Population</div>
    <div class="slider-group">
      <div class="slider-label"><span>Boids</span><span class="val" id="v-count">300</span></div>
      <input type="range" id="count" min="50" max="800" step="25" value="300">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Species</span><span class="val" id="v-species">3</span></div>
      <input type="range" id="species" min="1" max="6" step="1" value="3">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Predators</span><span class="val" id="v-predators">2</span></div>
      <input type="range" id="predators" min="0" max="8" step="1" value="2">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Visual</div>
    <div class="slider-group">
      <div class="slider-label"><span>Trail Length</span><span class="val" id="v-trail">0.12</span></div>
      <input type="range" id="trail" min="0" max="0.5" step="0.01" value="0.12">
    </div>
    <div class="btn-row" style="margin-bottom: 8px">
      <button class="btn active" data-style="triangle">Triangle</button>
      <button class="btn" data-style="dot">Dot</button>
      <button class="btn" data-style="arrow">Arrow</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-glow">Glow</button>
      <button class="btn" id="btn-perception">Show Range</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Mouse Mode</div>
    <div class="btn-row">
      <button class="btn active" data-mouse="attract">Attract</button>
      <button class="btn" data-mouse="repel">Repel</button>
      <button class="btn" data-mouse="vortex">Vortex</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-row">
      <button class="btn" data-preset="murmuration">Murmuration</button>
      <button class="btn" data-preset="schooling">Schooling</button>
      <button class="btn" data-preset="chaos">Chaos</button>
      <button class="btn" data-preset="swarm">Tight Swarm</button>
      <button class="btn" data-preset="predator">Predator Hunt</button>
      <button class="btn" data-preset="galaxy">Galaxy</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stats</div>
    <div class="stat-row"><span>FPS</span><span class="val" id="stat-fps">60</span></div>
    <div class="stat-row"><span>Boids</span><span class="val" id="stat-boids">300</span></div>
    <div class="stat-row"><span>Predators</span><span class="val" id="stat-predators">2</span></div>
    <div class="stat-row"><span>Avg Speed</span><span class="val" id="stat-speed">0</span></div>
  </div>
</div>

<div id="info-overlay">
  <kbd>Click</kbd> interact · <kbd>H</kbd> toggle panel · <kbd>Space</kbd> pause · <kbd>R</kbd> reset
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const SPECIES_COLORS = [
  [100, 180, 255],
  [255, 120, 180],
  [120, 255, 160],
  [255, 200, 80],
  [200, 130, 255],
  [255, 140, 100],
];

const PREDATOR_COLOR = [255, 50, 50];

const params = {
  cohesion: 1.0,
  alignment: 1.0,
  separation: 1.2,
  perception: 80,
  maxSpeed: 4.0,
  count: 300,
  species: 3,
  predators: 2,
  trail: 0.12,
  boidStyle: 'triangle',
  mouseMode: 'attract',
  glow: false,
  showPerception: false,
};

let boids = [];
let predators = [];
let paused = false;
let mouseDown = false;
let mouseX = 0, mouseY = 0;

class Boid {
  constructor(species) {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.species = species;
    this.color = SPECIES_COLORS[species % SPECIES_COLORS.length];
    this.scared = 0;
  }

  update(allBoids, preds) {
    let cohX = 0, cohY = 0, cohCount = 0;
    let aliX = 0, aliY = 0, aliCount = 0;
    let sepX = 0, sepY = 0;

    const percSq = params.perception * params.perception;
    const sepDist = params.perception * 0.35;
    const sepSq = sepDist * sepDist;

    for (let i = 0; i < allBoids.length; i++) {
      const other = allBoids[i];
      if (other === this) continue;

      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const distSq = dx * dx + dy * dy;

      if (distSq > percSq) continue;

      if (other.species === this.species) {
        cohX += other.x;
        cohY += other.y;
        cohCount++;

        aliX += other.vx;
        aliY += other.vy;
        aliCount++;
      }

      if (distSq < sepSq && distSq > 0) {
        const dist = Math.sqrt(distSq);
        sepX -= (dx / dist) * (sepDist - dist) / sepDist;
        sepY -= (dy / dist) * (sepDist - dist) / sepDist;
      }
    }

    let ax = 0, ay = 0;

    if (cohCount > 0) {
      const cx = cohX / cohCount - this.x;
      const cy = cohY / cohCount - this.y;
      ax += cx * 0.005 * params.cohesion;
      ay += cy * 0.005 * params.cohesion;
    }

    if (aliCount > 0) {
      ax += (aliX / aliCount - this.vx) * 0.05 * params.alignment;
      ay += (aliY / aliCount - this.vy) * 0.05 * params.alignment;
    }

    ax += sepX * 0.8 * params.separation;
    ay += sepY * 0.8 * params.separation;

    this.scared *= 0.95;
    for (let p = 0; p < preds.length; p++) {
      const pred = preds[p];
      const dx = pred.x - this.x;
      const dy = pred.y - this.y;
      const distSq = dx * dx + dy * dy;
      const fleeDist = params.perception * 2;
      if (distSq < fleeDist * fleeDist && distSq > 0) {
        const dist = Math.sqrt(distSq);
        const strength = (fleeDist - dist) / fleeDist;
        ax -= (dx / dist) * strength * 2.5;
        ay -= (dy / dist) * strength * 2.5;
        this.scared = Math.min(1, this.scared + 0.3);
      }
    }

    if (mouseDown) {
      const dx = mouseX - this.x;
      const dy = mouseY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200 && dist > 0) {
        const strength = (200 - dist) / 200 * 0.3;
        if (params.mouseMode === 'attract') {
          ax += (dx / dist) * strength;
          ay += (dy / dist) * strength;
        } else if (params.mouseMode === 'repel') {
          ax -= (dx / dist) * strength;
          ay -= (dy / dist) * strength;
        } else if (params.mouseMode === 'vortex') {
          ax += (-dy / dist) * strength;
          ay += (dx / dist) * strength;
        }
      }
    }

    const margin = 50;
    const turnForce = 0.3;
    if (this.x < margin) ax += turnForce;
    if (this.x > W - margin) ax -= turnForce;
    if (this.y < margin) ay += turnForce;
    if (this.y > H - margin) ay -= turnForce;

    this.vx += ax;
    this.vy += ay;

    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const ms = params.maxSpeed;
    if (speed > ms) {
      this.vx = (this.vx / speed) * ms;
      this.vy = (this.vy / speed) * ms;
    }
    if (speed < 1) {
      this.vx = (this.vx / (speed || 1)) * 1;
      this.vy = (this.vy / (speed || 1)) * 1;
    }

    this.x += this.vx;
    this.y += this.vy;
  }

  draw() {
    const angle = Math.atan2(this.vy, this.vx);
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const r = this.color[0], g = this.color[1], b = this.color[2];

    const scareMix = this.scared;
    const fr = Math.round(r + (255 - r) * scareMix);
    const fg = Math.round(g * (1 - scareMix * 0.7));
    const fb = Math.round(b * (1 - scareMix * 0.7));

    const alpha = 0.6 + (speed / params.maxSpeed) * 0.4;

    if (params.glow) {
      ctx.shadowColor = `rgba(${fr},${fg},${fb},0.6)`;
      ctx.shadowBlur = 8;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    const size = 5 + (speed / params.maxSpeed) * 3;

    if (params.boidStyle === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(size, 0);
      ctx.lineTo(-size * 0.6, -size * 0.45);
      ctx.lineTo(-size * 0.3, 0);
      ctx.lineTo(-size * 0.6, size * 0.45);
      ctx.closePath();
      ctx.fillStyle = `rgba(${fr},${fg},${fb},${alpha})`;
      ctx.fill();
    } else if (params.boidStyle === 'dot') {
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${fr},${fg},${fb},${alpha})`;
      ctx.fill();
    } else if (params.boidStyle === 'arrow') {
      ctx.beginPath();
      ctx.moveTo(size, 0);
      ctx.lineTo(-size * 0.5, -size * 0.5);
      ctx.moveTo(size, 0);
      ctx.lineTo(-size * 0.5, size * 0.5);
      ctx.strokeStyle = `rgba(${fr},${fg},${fb},${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();

    if (params.glow) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }
}

class Predator {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * 2;
    this.vy = Math.sin(angle) * 2;
    this.huntCooldown = 0;
  }

  update(allBoids) {
    let nearestDist = Infinity;
    let nearestBoid = null;

    const huntRange = params.perception * 3;

    for (let i = 0; i < allBoids.length; i++) {
      const b = allBoids[i];
      const dx = b.x - this.x;
      const dy = b.y - this.y;
      const dist = dx * dx + dy * dy;
      if (dist < nearestDist) {
        nearestDist = dist;
        nearestBoid = b;
      }
    }

    let ax = 0, ay = 0;

    if (nearestBoid && nearestDist < huntRange * huntRange) {
      const dx = nearestBoid.x - this.x;
      const dy = nearestBoid.y - this.y;
      const dist = Math.sqrt(nearestDist);
      ax += (dx / dist) * 0.15;
      ay += (dy / dist) * 0.15;

      if (dist < 15) {
        this.huntCooldown = 30;
      }
    } else {
      ax += (Math.random() - 0.5) * 0.1;
      ay += (Math.random() - 0.5) * 0.1;
    }

    if (this.huntCooldown > 0) {
      this.huntCooldown--;
      ax *= 0.3;
      ay *= 0.3;
    }

    const margin = 60;
    const turnForce = 0.2;
    if (this.x < margin) ax += turnForce;
    if (this.x > W - margin) ax -= turnForce;
    if (this.y < margin) ay += turnForce;
    if (this.y > H - margin) ay -= turnForce;

    this.vx += ax;
    this.vy += ay;

    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const predSpeed = params.maxSpeed * 0.85;
    if (speed > predSpeed) {
      this.vx = (this.vx / speed) * predSpeed;
      this.vy = (this.vy / speed) * predSpeed;
    }

    this.x += this.vx;
    this.y += this.vy;
  }

  draw() {
    const angle = Math.atan2(this.vy, this.vx);
    const size = 12;
    const pulse = 0.7 + Math.sin(Date.now() * 0.008) * 0.3;

    if (params.glow) {
      ctx.shadowColor = `rgba(255,50,50,0.8)`;
      ctx.shadowBlur = 16;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(-size * 0.7, -size * 0.6);
    ctx.lineTo(-size * 0.2, 0);
    ctx.lineTo(-size * 0.7, size * 0.6);
    ctx.closePath();
    ctx.fillStyle = `rgba(255,50,50,${pulse})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(255,100,100,0.5)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();

    if (params.showPerception) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, params.perception * 3, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,50,50,0.1)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    if (params.glow) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }
}

function initBoids() {
  boids = [];
  predators = [];
  for (let i = 0; i < params.count; i++) {
    boids.push(new Boid(i % params.species));
  }
  for (let i = 0; i < params.predators; i++) {
    predators.push(new Predator());
  }
}

initBoids();

const presets = {
  murmuration: { cohesion: 1.5, alignment: 1.8, separation: 1.0, perception: 100, maxSpeed: 5, count: 500, species: 1, predators: 0, trail: 0.08 },
  schooling: { cohesion: 2.0, alignment: 2.0, separation: 1.5, perception: 60, maxSpeed: 3.5, count: 400, species: 2, predators: 0, trail: 0.15 },
  chaos: { cohesion: 0.3, alignment: 0.2, separation: 2.5, perception: 40, maxSpeed: 7, count: 300, species: 5, predators: 0, trail: 0.05 },
  swarm: { cohesion: 2.5, alignment: 2.5, separation: 0.8, perception: 120, maxSpeed: 3, count: 400, species: 1, predators: 0, trail: 0.2 },
  predator: { cohesion: 1.2, alignment: 1.5, separation: 1.3, perception: 80, maxSpeed: 4.5, count: 300, species: 2, predators: 4, trail: 0.1 },
  galaxy: { cohesion: 0.8, alignment: 0.5, separation: 1.0, perception: 150, maxSpeed: 2.5, count: 600, species: 6, predators: 0, trail: 0.35 },
};

const sliders = ['cohesion', 'alignment', 'separation', 'perception', 'maxSpeed', 'count', 'species', 'predators', 'trail'];

sliders.forEach(name => {
  const el = document.getElementById(name);
  el.addEventListener('input', () => {
    const val = parseFloat(el.value);
    params[name] = val;
    document.getElementById('v-' + name).textContent = val;

    if (name === 'count' || name === 'species' || name === 'predators') {
      initBoids();
    }
  });
});

function applyPreset(name) {
  const p = presets[name];
  if (!p) return;
  Object.assign(params, p);
  sliders.forEach(s => {
    const el = document.getElementById(s);
    el.value = params[s];
    document.getElementById('v-' + s).textContent = params[s];
  });
  initBoids();
}

document.querySelectorAll('[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

document.querySelectorAll('[data-style]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    params.boidStyle = btn.dataset.style;
  });
});

document.querySelectorAll('[data-mouse]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mouse]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    params.mouseMode = btn.dataset.mouse;
  });
});

document.getElementById('btn-glow').addEventListener('click', function() {
  params.glow = !params.glow;
  this.classList.toggle('active');
});

document.getElementById('btn-perception').addEventListener('click', function() {
  params.showPerception = !params.showPerception;
  this.classList.toggle('active');
});

canvas.addEventListener('mousedown', (e) => { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('touchstart', (e) => { mouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; e.preventDefault(); });
canvas.addEventListener('touchmove', (e) => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; e.preventDefault(); });
canvas.addEventListener('touchend', () => { mouseDown = false; });

const controlsPanel = document.getElementById('controls');
const toggleBtn = document.getElementById('toggle-btn');

document.getElementById('close-controls').addEventListener('click', () => {
  controlsPanel.classList.add('collapsed');
  toggleBtn.classList.add('visible');
});

toggleBtn.addEventListener('click', () => {
  controlsPanel.classList.remove('collapsed');
  toggleBtn.classList.remove('visible');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'h' || e.key === 'H') {
    controlsPanel.classList.toggle('collapsed');
    toggleBtn.classList.toggle('visible');
  }
  if (e.key === ' ') {
    e.preventDefault();
    paused = !paused;
  }
  if (e.key === 'r' || e.key === 'R') {
    initBoids();
  }
});

let lastTime = performance.now();
let frameCount = 0;
let fps = 60;

function updateStats() {
  document.getElementById('stat-fps').textContent = fps;
  document.getElementById('stat-boids').textContent = boids.length;
  document.getElementById('stat-predators').textContent = predators.length;

  let totalSpeed = 0;
  for (let i = 0; i < boids.length; i++) {
    totalSpeed += Math.sqrt(boids[i].vx * boids[i].vx + boids[i].vy * boids[i].vy);
  }
  document.getElementById('stat-speed').textContent = (totalSpeed / (boids.length || 1)).toFixed(1);
}

function animate(now) {
  requestAnimationFrame(animate);

  frameCount++;
  if (now - lastTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastTime = now;
    updateStats();
  }

  if (paused) return;

  const trailAlpha = Math.max(0.01, params.trail);
  ctx.fillStyle = `rgba(10,10,18,${trailAlpha})`;
  ctx.fillRect(0, 0, W, H);

  if (mouseDown) {
    const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
    if (params.mouseMode === 'attract') {
      gradient.addColorStop(0, 'rgba(100,180,255,0.08)');
    } else if (params.mouseMode === 'repel') {
      gradient.addColorStop(0, 'rgba(255,100,100,0.08)');
    } else {
      gradient.addColorStop(0, 'rgba(180,100,255,0.08)');
    }
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(mouseX - 200, mouseY - 200, 400, 400);
  }

  for (let i = 0; i < boids.length; i++) {
    boids[i].update(boids, predators);
  }
  for (let i = 0; i < predators.length; i++) {
    predators[i].update(boids);
  }

  if (params.showPerception && boids.length > 0) {
    ctx.beginPath();
    ctx.arc(boids[0].x, boids[0].y, params.perception, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${boids[0].color[0]},${boids[0].color[1]},${boids[0].color[2]},0.15)`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  for (let i = 0; i < boids.length; i++) {
    boids[i].draw();
  }
  for (let i = 0; i < predators.length; i++) {
    predators[i].draw();
  }
}

requestAnimationFrame(animate);

setTimeout(() => {
  const overlay = document.getElementById('info-overlay');
  overlay.style.opacity = '0';
  setTimeout(() => overlay.remove(), 1000);
}, 6000);
</script>
</body>
</html>
