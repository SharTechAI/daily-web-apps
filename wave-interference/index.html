<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Interference Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    color: #e0e0f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10, 10, 18, 0.9);
    border-bottom: 1px solid #1e1e30;
    z-index: 10;
    flex-shrink: 0;
  }

  .title-section {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .title-icon {
    font-size: 1.6rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: #6a6a8a;
    margin-top: 1px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label {
    font-size: 0.72rem;
    color: #7a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    background: #2a2a40;
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #6e5ff7;
    border-radius: 50%;
    cursor: pointer;
  }

  select {
    background: #1a1a28;
    color: #c0c0d8;
    border: 1px solid #2a2a40;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    outline: none;
  }

  button {
    background: #1a1a28;
    color: #c0c0d8;
    border: 1px solid #2a2a40;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover {
    background: #6e5ff7;
    color: #fff;
    border-color: #6e5ff7;
  }

  .canvas-container {
    flex: 1;
    position: relative;
    cursor: crosshair;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .source-count {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(16, 16, 26, 0.85);
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.75rem;
    color: #7a7a9a;
    backdrop-filter: blur(8px);
    z-index: 5;
  }

  .source-count span {
    color: #5ee7b7;
    font-weight: 600;
  }

  .hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.5s;
  }

  .hint-text {
    font-size: 1.1rem;
    color: #4a4a6a;
    margin-bottom: 6px;
  }

  .hint-sub {
    font-size: 0.78rem;
    color: #3a3a54;
  }

  .legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(16, 16, 26, 0.85);
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.7rem;
    color: #6a6a8a;
    backdrop-filter: blur(8px);
    z-index: 5;
    line-height: 1.6;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-swatch {
    width: 14px;
    height: 10px;
    border-radius: 2px;
  }

  @media (max-width: 800px) {
    header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
    }
    .controls { gap: 10px; }
    input[type="range"] { width: 70px; }
  }
</style>
</head>
<body>

<header>
  <div class="title-section">
    <div class="title-icon">🌊</div>
    <div>
      <h1>Wave Interference Simulator</h1>
      <div class="subtitle">Click to place wave sources &middot; Watch interference patterns emerge</div>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>Frequency</label>
      <input type="range" id="frequency" min="0.02" max="0.12" step="0.005" value="0.06">
    </div>
    <div class="control-group">
      <label>Amplitude</label>
      <input type="range" id="amplitude" min="0.3" max="1.0" step="0.05" value="0.7">
    </div>
    <div class="control-group">
      <label>Damping</label>
      <input type="range" id="damping" min="0.001" max="0.01" step="0.001" value="0.004">
    </div>
    <div class="control-group">
      <label>Color</label>
      <select id="colorScheme">
        <option value="ocean">Ocean</option>
        <option value="fire">Fire</option>
        <option value="plasma">Plasma</option>
        <option value="monochrome">Monochrome</option>
        <option value="neon">Neon</option>
      </select>
    </div>
    <button id="clearBtn">Clear All</button>
    <button id="pauseBtn">Pause</button>
  </div>
</header>

<div class="canvas-container" id="container">
  <canvas id="canvas"></canvas>
  <div class="hint" id="hint">
    <div class="hint-text">Click anywhere to place a wave source</div>
    <div class="hint-sub">Each source emits circular waves that interfere with others</div>
  </div>
  <div class="source-count" id="sourceCount">Sources: <span>0</span></div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background: #4488ff"></div>
      Peak (constructive)
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #0a0a18"></div>
      Trough (destructive)
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #223366"></div>
      Node (cancellation)
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
const hint = document.getElementById('hint');
const sourceCountEl = document.getElementById('sourceCount').querySelector('span');

const freqSlider = document.getElementById('frequency');
const ampSlider = document.getElementById('amplitude');
const dampSlider = document.getElementById('damping');
const colorSelect = document.getElementById('colorScheme');
const clearBtn = document.getElementById('clearBtn');
const pauseBtn = document.getElementById('pauseBtn');

let sources = [];
let paused = false;
let time = 0;
let scale = 3;
let imgData;
let w, h;

const colorSchemes = {
  ocean(v) {
    const t = (v + 1) * 0.5;
    const r = Math.floor(t * t * 60);
    const g = Math.floor(t * 100 + t * t * 80);
    const b = Math.floor(80 + t * 175);
    return [r, g, b];
  },
  fire(v) {
    const t = (v + 1) * 0.5;
    const r = Math.floor(20 + t * 235);
    const g = Math.floor(t * t * 160);
    const b = Math.floor(t * t * t * 80);
    return [r, g, b];
  },
  plasma(v) {
    const t = (v + 1) * 0.5;
    const r = Math.floor(60 + Math.sin(t * Math.PI) * 195);
    const g = Math.floor(t * t * 120);
    const b = Math.floor(100 + Math.cos(t * Math.PI * 0.5) * 155);
    return [r, g, b];
  },
  monochrome(v) {
    const t = (v + 1) * 0.5;
    const c = Math.floor(t * 220);
    return [c, c, Math.floor(c * 1.1)];
  },
  neon(v) {
    const t = (v + 1) * 0.5;
    const r = Math.floor(Math.sin(t * Math.PI * 1.5) * 200 + 55);
    const g = Math.floor(t * 255);
    const b = Math.floor(Math.cos(t * Math.PI) * 128 + 127);
    return [r, g, b];
  }
};

function resize() {
  const rect = container.getBoundingClientRect();
  w = Math.floor(rect.width / scale);
  h = Math.floor(rect.height / scale);
  canvas.width = w;
  canvas.height = h;
  imgData = ctx.createImageData(w, h);
}

window.addEventListener('resize', resize);
resize();

canvas.addEventListener('click', (e) => {
  const rect = container.getBoundingClientRect();
  const x = (e.clientX - rect.left) / scale;
  const y = (e.clientY - rect.top) / scale;
  sources.push({ x, y, birth: time });
  sourceCountEl.textContent = sources.length;
  hint.style.opacity = '0';
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (sources.length > 0) {
    const rect = container.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / scale;
    const my = (e.clientY - rect.top) / scale;
    let closest = 0;
    let minDist = Infinity;
    for (let i = 0; i < sources.length; i++) {
      const dx = sources[i].x - mx;
      const dy = sources[i].y - my;
      const d = dx * dx + dy * dy;
      if (d < minDist) { minDist = d; closest = i; }
    }
    sources.splice(closest, 1);
    sourceCountEl.textContent = sources.length;
    if (sources.length === 0) hint.style.opacity = '1';
  }
});

clearBtn.addEventListener('click', () => {
  sources = [];
  sourceCountEl.textContent = '0';
  hint.style.opacity = '1';
  time = 0;
});

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
});

function render() {
  const freq = parseFloat(freqSlider.value);
  const amp = parseFloat(ampSlider.value);
  const damp = parseFloat(dampSlider.value);
  const scheme = colorSchemes[colorSelect.value];
  const data = imgData.data;
  const numSources = sources.length;

  for (let py = 0; py < h; py++) {
    for (let px = 0; px < w; px++) {
      let val = 0;
      for (let s = 0; s < numSources; s++) {
        const src = sources[s];
        const dx = px - src.x;
        const dy = py - src.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const age = time - src.birth;
        const wavePhase = dist * freq - age * 0.08;
        const envelope = amp * Math.exp(-dist * damp);
        val += Math.sin(wavePhase * Math.PI * 2) * envelope;
      }

      if (numSources > 0) {
        val = Math.max(-1, Math.min(1, val));
      }

      const [r, g, b] = scheme(val);
      const idx = (py * w + px) * 4;
      data[idx] = r;
      data[idx + 1] = g;
      data[idx + 2] = b;
      data[idx + 3] = 255;
    }
  }

  ctx.putImageData(imgData, 0, 0);

  for (let s = 0; s < numSources; s++) {
    const src = sources[s];
    ctx.beginPath();
    ctx.arc(src.x, src.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(src.x, src.y, 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function animate() {
  if (!paused) {
    time += 1;
    render();
  }
  requestAnimationFrame(animate);
}

render();
animate();
</script>
</body>
</html>
