<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voronoi Tessellation Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d12;
    color: #e0e0f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
  }

  canvas {
    flex: 1;
    cursor: crosshair;
    display: block;
  }

  .sidebar {
    width: 280px;
    background: #14141c;
    border-left: 1px solid #2a2a3a;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
  }

  .sidebar h1 {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #7c6ff7, #5ee7b7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sidebar .subtitle {
    font-size: 0.75rem;
    color: #666;
    margin-top: 2px;
  }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    margin-top: 4px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .control-row label {
    font-size: 0.78rem;
    color: #aaa;
  }

  .control-row .value {
    font-size: 0.72rem;
    color: #7c6ff7;
    font-weight: 600;
    min-width: 30px;
    text-align: right;
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: #2a2a3a;
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7c6ff7;
    cursor: pointer;
    border: 2px solid #14141c;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 70px;
    padding: 8px 10px;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    background: #1a1a26;
    color: #ccc;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn:hover { border-color: #7c6ff7; color: #fff; background: #1e1e30; }
  .btn.active { border-color: #7c6ff7; background: #2a2050; color: #fff; }

  .btn-accent {
    background: linear-gradient(135deg, #7c6ff7, #5b52d9);
    border-color: #7c6ff7;
    color: #fff;
  }
  .btn-accent:hover { opacity: 0.9; }

  .color-scheme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .color-swatch {
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }

  .color-swatch:hover { transform: scale(1.08); }
  .color-swatch.active { border-color: #fff; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toggle-row label {
    font-size: 0.78rem;
    color: #aaa;
  }

  .toggle {
    width: 36px;
    height: 20px;
    border-radius: 10px;
    background: #2a2a3a;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
    outline: none;
  }

  .toggle.on { background: #7c6ff7; }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 18px; }

  .stats {
    font-size: 0.7rem;
    color: #555;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stats span { color: #7c6ff7; font-weight: 600; }

  .hint {
    font-size: 0.68rem;
    color: #444;
    line-height: 1.5;
    border-top: 1px solid #222;
    padding-top: 12px;
    margin-top: auto;
  }

  .mode-indicator {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(20,20,28,0.9);
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.72rem;
    color: #7c6ff7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }

  .mode-indicator.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="sidebar">
  <div>
    <h1>Voronoi Tessellation</h1>
    <div class="subtitle">Click to place points, drag to move</div>
  </div>

  <div class="stats">
    Points: <span id="point-count">0</span> &nbsp;|&nbsp; FPS: <span id="fps">60</span>
  </div>

  <div class="section-label">Mode</div>
  <div class="btn-row">
    <button class="btn active" data-mode="add" id="btn-add">Add</button>
    <button class="btn" data-mode="move" id="btn-move">Move</button>
    <button class="btn" data-mode="delete" id="btn-delete">Delete</button>
  </div>

  <div class="section-label">Color Scheme</div>
  <div class="color-scheme-grid" id="scheme-grid"></div>

  <div class="section-label">Display</div>
  <div class="control-group">
    <div class="toggle-row">
      <label>Voronoi Cells</label>
      <button class="toggle on" id="toggle-voronoi"></button>
    </div>
    <div class="toggle-row">
      <label>Delaunay Triangulation</label>
      <button class="toggle" id="toggle-delaunay"></button>
    </div>
    <div class="toggle-row">
      <label>Seed Points</label>
      <button class="toggle on" id="toggle-points"></button>
    </div>
    <div class="toggle-row">
      <label>Cell Borders</label>
      <button class="toggle on" id="toggle-borders"></button>
    </div>
    <div class="toggle-row">
      <label>Animate Points</label>
      <button class="toggle" id="toggle-animate"></button>
    </div>
  </div>

  <div class="section-label">Border Width</div>
  <div class="control-group">
    <div class="control-row">
      <label>Width</label>
      <div class="value" id="border-val">1.5</div>
    </div>
    <input type="range" id="border-width" min="0.5" max="5" step="0.5" value="1.5">
  </div>

  <div class="section-label">Actions</div>
  <div class="btn-row">
    <button class="btn" id="btn-random">Random 30</button>
    <button class="btn" id="btn-grid">Grid</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-accent" id="btn-relax">Relax (Lloyd)</button>
    <button class="btn" id="btn-clear">Clear All</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-export">Export PNG</button>
    <button class="btn" id="btn-jitter">Jitter</button>
  </div>

  <div class="section-label">Presets</div>
  <div class="btn-row">
    <button class="btn" data-preset="spiral">Spiral</button>
    <button class="btn" data-preset="circle">Circle</button>
    <button class="btn" data-preset="wave">Wave</button>
  </div>

  <div class="hint">
    Click canvas to add points<br>
    Right-click to delete nearest<br>
    Scroll to zoom (coming soon)<br>
    Shift+click for 5 random nearby
  </div>
</div>

<div class="mode-indicator" id="mode-indicator">Add Mode</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
let points = [];
let mode = 'add';
let dragging = null;
let dragOffset = { x: 0, y: 0 };

let showVoronoi = true;
let showDelaunay = false;
let showPoints = true;
let showBorders = true;
let animatePoints = false;
let borderWidth = 1.5;
let currentScheme = 0;
let relaxing = false;
let relaxSteps = 0;

const colorSchemes = [
  { name: 'Neon', colors: ['#ff006e','#fb5607','#ffbe0b','#3a86ff','#8338ec','#06d6a0','#118ab2','#ef476f'] },
  { name: 'Ocean', colors: ['#03045e','#023e8a','#0077b6','#0096c7','#00b4d8','#48cae4','#90e0ef','#ade8f4'] },
  { name: 'Sunset', colors: ['#ff595e','#ff924c','#ffca3a','#c5ca30','#8ac926','#36949d','#1982c4','#6a4c93'] },
  { name: 'Pastel', colors: ['#ffc6ff','#bdb2ff','#a0c4ff','#9bf6ff','#caffbf','#fdffb6','#ffd6a5','#ffadad'] },
  { name: 'Forest', colors: ['#1b4332','#2d6a4f','#40916c','#52b788','#74c69d','#95d5b2','#b7e4c7','#d8f3dc'] },
  { name: 'Candy', colors: ['#e63946','#f1faee','#a8dadc','#457b9d','#1d3557','#ff85a1','#fbb1bd','#f7cad0'] },
  { name: 'Mono', colors: ['#111','#222','#333','#444','#555','#666','#777','#888'] },
  { name: 'Lava', colors: ['#590d22','#800f2f','#a4133c','#c9184a','#ff4d6d','#ff758f','#ff8fa3','#ffb3c1'] },
];

function resize() {
  W = canvas.width = canvas.clientWidth * devicePixelRatio;
  H = canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

window.addEventListener('resize', () => {
  const oldW = canvas.clientWidth;
  const oldH = canvas.clientHeight;
  resize();
  const newW = canvas.clientWidth;
  const newH = canvas.clientHeight;
  for (const p of points) {
    p.x *= newW / oldW;
    p.y *= newH / oldH;
  }
});
resize();

function buildSchemeGrid() {
  const grid = document.getElementById('scheme-grid');
  grid.innerHTML = '';
  colorSchemes.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'color-swatch' + (i === currentScheme ? ' active' : '');
    div.style.background = `linear-gradient(135deg, ${s.colors[0]}, ${s.colors[3]}, ${s.colors[6] || s.colors[2]})`;
    div.title = s.name;
    div.addEventListener('click', () => {
      currentScheme = i;
      document.querySelectorAll('.color-swatch').forEach((el, j) => el.classList.toggle('active', j === i));
    });
    grid.appendChild(div);
  });
}
buildSchemeGrid();

// Delaunay triangulation (Bowyer-Watson)
function delaunay(pts) {
  if (pts.length < 3) return { triangles: [], edges: [] };

  const superTriangle = [
    { x: -1000, y: -1000 },
    { x: 4000, y: -1000 },
    { x: 1500, y: 5000 },
  ];

  let triangles = [{ v: [0, 1, 2] }];
  const allPts = [...superTriangle, ...pts];

  for (let i = 3; i < allPts.length; i++) {
    const p = allPts[i];
    const bad = [];

    for (let t = 0; t < triangles.length; t++) {
      const tri = triangles[t];
      const a = allPts[tri.v[0]], b = allPts[tri.v[1]], c = allPts[tri.v[2]];
      if (inCircumcircle(p, a, b, c)) bad.push(t);
    }

    const polygon = [];
    for (const t of bad) {
      const tri = triangles[t];
      for (let e = 0; e < 3; e++) {
        const a = tri.v[e], b = tri.v[(e + 1) % 3];
        let shared = false;
        for (const t2 of bad) {
          if (t2 === t) continue;
          const tri2 = triangles[t2];
          if ((tri2.v.includes(a) && tri2.v.includes(b))) { shared = true; break; }
        }
        if (!shared) polygon.push([a, b]);
      }
    }

    const newTris = [];
    for (let t = 0; t < triangles.length; t++) {
      if (!bad.includes(t)) newTris.push(triangles[t]);
    }

    for (const [a, b] of polygon) {
      newTris.push({ v: [a, b, i] });
    }

    triangles = newTris;
  }

  triangles = triangles.filter(t => !t.v.some(v => v < 3));

  const edges = [];
  const edgeSet = new Set();
  for (const t of triangles) {
    for (let e = 0; e < 3; e++) {
      const a = t.v[e] - 3, b = t.v[(e + 1) % 3] - 3;
      const key = Math.min(a, b) + ',' + Math.max(a, b);
      if (!edgeSet.has(key)) {
        edgeSet.add(key);
        edges.push([a, b]);
      }
    }
  }

  return { triangles, edges, allPts };
}

function inCircumcircle(p, a, b, c) {
  const ax = a.x - p.x, ay = a.y - p.y;
  const bx = b.x - p.x, by = b.y - p.y;
  const cx = c.x - p.x, cy = c.y - p.y;
  const det = (ax * ax + ay * ay) * (bx * cy - cx * by)
            - (bx * bx + by * by) * (ax * cy - cx * ay)
            + (cx * cx + cy * cy) * (ax * by - bx * ay);
  return det > 0;
}

// Voronoi via pixel-based approach (for rendering) and geometric for borders
function computeVoronoi(pts, w, h) {
  if (pts.length === 0) return [];

  const cells = pts.map(() => []);
  const { triangles, edges, allPts } = delaunay(pts);

  // Compute Voronoi vertices from Delaunay circumcenters
  const voronoiEdges = [];
  for (let i = 0; i < triangles.length; i++) {
    const t1 = triangles[i];
    const cc1 = circumcenter(allPts[t1.v[0]], allPts[t1.v[1]], allPts[t1.v[2]]);

    for (let j = i + 1; j < triangles.length; j++) {
      const t2 = triangles[j];
      const shared = t1.v.filter(v => t2.v.includes(v));
      if (shared.length === 2) {
        const cc2 = circumcenter(allPts[t2.v[0]], allPts[t2.v[1]], allPts[t2.v[2]]);
        voronoiEdges.push([cc1, cc2]);
      }
    }
  }

  return { voronoiEdges, delaunayEdges: edges };
}

function circumcenter(a, b, c) {
  const D = 2 * (a.x * (b.y - c.y) + b.x * (c.y - a.y) + c.x * (a.y - b.y));
  if (Math.abs(D) < 1e-10) return { x: (a.x + b.x + c.x) / 3, y: (a.y + b.y + c.y) / 3 };
  const ux = ((a.x * a.x + a.y * a.y) * (b.y - c.y) + (b.x * b.x + b.y * b.y) * (c.y - a.y) + (c.x * c.x + c.y * c.y) * (a.y - b.y)) / D;
  const uy = ((a.x * a.x + a.y * a.y) * (c.x - b.x) + (b.x * b.x + b.y * b.y) * (a.x - c.x) + (c.x * c.x + c.y * c.y) * (b.x - a.x)) / D;
  return { x: ux, y: uy };
}

let offCanvas = null;
let offCtx = null;
const DOWNSAMPLE = 3;

function drawVoronoiCells(pts, w, h) {
  if (pts.length === 0) return;

  const cw = Math.ceil(w / DOWNSAMPLE);
  const ch = Math.ceil(h / DOWNSAMPLE);

  if (!offCanvas || offCanvas.width !== cw || offCanvas.height !== ch) {
    offCanvas = document.createElement('canvas');
    offCanvas.width = cw;
    offCanvas.height = ch;
    offCtx = offCanvas.getContext('2d');
  }

  const scheme = colorSchemes[currentScheme].colors;
  const parsedColors = scheme.map(c => [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)]);
  const imgData = offCtx.createImageData(cw, ch);
  const data = imgData.data;

  const gridSize = Math.max(20, Math.ceil(60 / DOWNSAMPLE));
  const cols = Math.ceil(cw / gridSize);
  const rows = Math.ceil(ch / gridSize);
  const grid = new Array(cols * rows);
  for (let i = 0; i < grid.length; i++) grid[i] = [];

  const scale = 1 / DOWNSAMPLE;
  for (let i = 0; i < pts.length; i++) {
    const gx = Math.floor(pts[i].x * scale / gridSize);
    const gy = Math.floor(pts[i].y * scale / gridSize);
    const r = 3;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
          grid[ny * cols + nx].push(i);
        }
      }
    }
  }

  for (let y = 0; y < ch; y++) {
    const ry = y * DOWNSAMPLE;
    for (let x = 0; x < cw; x++) {
      const rx = x * DOWNSAMPLE;
      let minDist = Infinity;
      let nearest = 0;

      const gx = Math.floor(x / gridSize);
      const gy = Math.floor(y / gridSize);
      const candidates = grid[gy * cols + gx];

      if (candidates && candidates.length > 0) {
        for (const i of candidates) {
          const dx = rx - pts[i].x, dy2 = ry - pts[i].y;
          const d = dx * dx + dy2 * dy2;
          if (d < minDist) { minDist = d; nearest = i; }
        }
      } else {
        for (let i = 0; i < pts.length; i++) {
          const dx = rx - pts[i].x, dy2 = ry - pts[i].y;
          const d = dx * dx + dy2 * dy2;
          if (d < minDist) { minDist = d; nearest = i; }
        }
      }

      const [cr, cg, cb] = parsedColors[nearest % parsedColors.length];
      const idx = (y * cw + x) * 4;
      data[idx] = cr;
      data[idx + 1] = cg;
      data[idx + 2] = cb;
      data[idx + 3] = 220;
    }
  }

  offCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offCanvas, 0, 0, w, h);
  ctx.imageSmoothingEnabled = true;
}

// Lloyd relaxation step
function lloydRelax(pts, w, h) {
  if (pts.length < 2) return;

  const step = 4;
  const cw = Math.ceil(w);
  const ch = Math.ceil(h);
  const cx = new Float64Array(pts.length);
  const cy = new Float64Array(pts.length);
  const cc = new Uint32Array(pts.length);

  for (let y = 0; y < ch; y += step) {
    for (let x = 0; x < cw; x += step) {
      let minDist = Infinity, nearest = 0;
      for (let i = 0; i < pts.length; i++) {
        const dx = x - pts[i].x, dy = y - pts[i].y;
        const d = dx * dx + dy * dy;
        if (d < minDist) { minDist = d; nearest = i; }
      }
      cx[nearest] += x;
      cy[nearest] += y;
      cc[nearest]++;
    }
  }

  for (let i = 0; i < pts.length; i++) {
    if (cc[i] > 0) {
      pts[i].x += (cx[i] / cc[i] - pts[i].x) * 0.3;
      pts[i].y += (cy[i] / cc[i] - pts[i].y) * 0.3;
    }
  }
}

// Animation velocities
function initVelocity(p) {
  p.vx = (Math.random() - 0.5) * 1.5;
  p.vy = (Math.random() - 0.5) * 1.5;
}

function animateStep(w, h) {
  for (const p of points) {
    if (!p.vx) initVelocity(p);
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > w) p.vx *= -1;
    if (p.y < 0 || p.y > h) p.vy *= -1;
    p.x = Math.max(0, Math.min(w, p.x));
    p.y = Math.max(0, Math.min(h, p.y));
  }
}

let lastTime = performance.now();
let frameCount = 0;
let fpsDisplay = 60;

function draw() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fpsDisplay = frameCount;
    frameCount = 0;
    lastTime = now;
    document.getElementById('fps').textContent = fpsDisplay;
  }

  document.getElementById('point-count').textContent = points.length;

  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  if (animatePoints) animateStep(w, h);

  if (relaxing && relaxSteps > 0) {
    lloydRelax(points, w, h);
    relaxSteps--;
    if (relaxSteps === 0) relaxing = false;
  }

  if (showVoronoi && points.length > 0) {
    drawVoronoiCells(points, w, h);
  } else {
    ctx.fillStyle = '#0d0d12';
    ctx.fillRect(0, 0, w, h);
  }

  if ((showBorders || showDelaunay) && points.length >= 3) {
    const { voronoiEdges, delaunayEdges } = computeVoronoi(points, w, h);

    if (showBorders && voronoiEdges) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = borderWidth;
      ctx.beginPath();
      for (const [a, b] of voronoiEdges) {
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
      }
      ctx.stroke();
    }

    if (showDelaunay && delaunayEdges) {
      ctx.strokeStyle = 'rgba(124,111,247,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (const [a, b] of delaunayEdges) {
        ctx.moveTo(points[a].x, points[a].y);
        ctx.lineTo(points[b].x, points[b].y);
      }
      ctx.stroke();
    }
  }

  if (showPoints) {
    for (const p of points) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#0d0d12';
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
}

function showModeIndicator(text) {
  const el = document.getElementById('mode-indicator');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function findNearest(x, y) {
  let minD = Infinity, idx = -1;
  for (let i = 0; i < points.length; i++) {
    const dx = x - points[i].x, dy = y - points[i].y;
    const d = dx * dx + dy * dy;
    if (d < minD) { minD = d; idx = i; }
  }
  return { idx, dist: Math.sqrt(minD) };
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (e.button === 2) {
    const { idx, dist } = findNearest(x, y);
    if (idx >= 0 && dist < 50) points.splice(idx, 1);
    return;
  }

  if (e.shiftKey) {
    for (let i = 0; i < 5; i++) {
      points.push({ x: x + (Math.random() - 0.5) * 80, y: y + (Math.random() - 0.5) * 80 });
    }
    return;
  }

  if (mode === 'add') {
    points.push({ x, y });
  } else if (mode === 'move') {
    const { idx, dist } = findNearest(x, y);
    if (idx >= 0 && dist < 40) {
      dragging = idx;
      dragOffset.x = points[idx].x - x;
      dragOffset.y = points[idx].y - y;
    }
  } else if (mode === 'delete') {
    const { idx, dist } = findNearest(x, y);
    if (idx >= 0 && dist < 40) points.splice(idx, 1);
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (dragging !== null) {
    const rect = canvas.getBoundingClientRect();
    points[dragging].x = e.clientX - rect.left + dragOffset.x;
    points[dragging].y = e.clientY - rect.top + dragOffset.y;
  }
});

canvas.addEventListener('mouseup', () => { dragging = null; });
canvas.addEventListener('mouseleave', () => { dragging = null; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  if (mode === 'add') {
    points.push({ x, y });
  } else if (mode === 'move') {
    const { idx, dist } = findNearest(x, y);
    if (idx >= 0 && dist < 40) {
      dragging = idx;
      dragOffset.x = points[idx].x - x;
      dragOffset.y = points[idx].y - y;
    }
  } else if (mode === 'delete') {
    const { idx, dist } = findNearest(x, y);
    if (idx >= 0 && dist < 40) points.splice(idx, 1);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (dragging !== null) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    points[dragging].x = touch.clientX - rect.left + dragOffset.x;
    points[dragging].y = touch.clientY - rect.top + dragOffset.y;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { dragging = null; });

// Mode buttons
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    canvas.style.cursor = mode === 'add' ? 'crosshair' : mode === 'move' ? 'grab' : 'pointer';
    showModeIndicator(mode.charAt(0).toUpperCase() + mode.slice(1) + ' Mode');
  });
});

// Toggles
function setupToggle(id, getter, setter) {
  const el = document.getElementById(id);
  el.addEventListener('click', () => {
    const val = !getter();
    setter(val);
    el.classList.toggle('on', val);
  });
}

setupToggle('toggle-voronoi', () => showVoronoi, v => showVoronoi = v);
setupToggle('toggle-delaunay', () => showDelaunay, v => showDelaunay = v);
setupToggle('toggle-points', () => showPoints, v => showPoints = v);
setupToggle('toggle-borders', () => showBorders, v => showBorders = v);
setupToggle('toggle-animate', () => animatePoints, v => {
  animatePoints = v;
  if (v) points.forEach(p => initVelocity(p));
});

// Border width
document.getElementById('border-width').addEventListener('input', (e) => {
  borderWidth = parseFloat(e.target.value);
  document.getElementById('border-val').textContent = borderWidth.toFixed(1);
});

// Action buttons
document.getElementById('btn-random').addEventListener('click', () => {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  for (let i = 0; i < 30; i++) {
    points.push({ x: Math.random() * w, y: Math.random() * h });
  }
});

document.getElementById('btn-grid').addEventListener('click', () => {
  points.length = 0;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const spacing = 60;
  for (let y = spacing; y < h; y += spacing) {
    for (let x = spacing; x < w; x += spacing) {
      points.push({ x, y });
    }
  }
});

document.getElementById('btn-relax').addEventListener('click', () => {
  if (points.length < 2) return;
  relaxing = true;
  relaxSteps = 30;
});

document.getElementById('btn-clear').addEventListener('click', () => {
  points.length = 0;
  relaxing = false;
});

document.getElementById('btn-export').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'voronoi.png';
  link.href = canvas.toDataURL();
  link.click();
});

document.getElementById('btn-jitter').addEventListener('click', () => {
  for (const p of points) {
    p.x += (Math.random() - 0.5) * 20;
    p.y += (Math.random() - 0.5) * 20;
  }
});

// Presets
document.querySelectorAll('[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const cx = w / 2, cy = h / 2;
    points.length = 0;

    switch (btn.dataset.preset) {
      case 'spiral':
        for (let i = 0; i < 80; i++) {
          const angle = i * 0.3;
          const r = i * 3;
          points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
        }
        break;
      case 'circle':
        for (let i = 0; i < 40; i++) {
          const angle = (i / 40) * Math.PI * 2;
          const r = Math.min(w, h) * 0.35;
          points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
        }
        points.push({ x: cx, y: cy });
        break;
      case 'wave':
        for (let i = 0; i < 60; i++) {
          const x = (i / 60) * w;
          const y = cy + Math.sin(i * 0.3) * 100;
          points.push({ x, y });
        }
        for (let i = 0; i < 60; i++) {
          const x = (i / 60) * w;
          const y = cy + Math.cos(i * 0.3) * 100 + 80;
          points.push({ x, y });
        }
        break;
    }
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === '1') document.getElementById('btn-add').click();
  if (e.key === '2') document.getElementById('btn-move').click();
  if (e.key === '3') document.getElementById('btn-delete').click();
  if (e.key === 'r') document.getElementById('btn-relax').click();
  if (e.key === 'c') document.getElementById('btn-clear').click();
});

requestAnimationFrame(() => {
  resize();
  const iw = canvas.clientWidth, ih = canvas.clientHeight;
  for (let i = 0; i < 15; i++) {
    points.push({ x: 40 + Math.random() * (iw - 80), y: 40 + Math.random() * (ih - 80) });
  }
  draw();
});
</script>
